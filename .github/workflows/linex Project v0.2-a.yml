name: NGK Kernel Build (FULL STABLE FIX)

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout NGK kernel
        uses: actions/checkout@v4
        with:
          repository: Pierre2324/NGK_android_kernel_xiaomi_sdm845
          ref: s-caf

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            bc bison flex libssl-dev \
            build-essential git \
            clang-14 lld-14 llvm-14 \
            gcc-arm-linux-gnueabi gcc-arm-linux-gnueabihf \
            python3 curl wget

      - name: Export environment
        run: |
          echo "KBUILD_BUILD_USER=ducky" >> $GITHUB_ENV
          echo "KBUILD_BUILD_HOST=lotsofduck" >> $GITHUB_ENV
          echo "ARCH=arm64" >> $GITHUB_ENV
          echo "SUBARCH=arm64" >> $GITHUB_ENV
          echo "OUT_DIR=out" >> $GITHUB_ENV
          echo "CROSS_COMPILE_ARM32=arm-linux-gnueabi-" >> $GITHUB_ENV

      - name: Clean build
        run: |
          rm -rf out
          mkdir -p out

      - name: Load defconfig
        run: |
          if [ -f arch/arm64/configs/beryllium_defconfig ]; then
            make O=$OUT_DIR ARCH=arm64 beryllium_defconfig
          else
            make O=$OUT_DIR ARCH=arm64 sdm845_defconfig
          fi

      - name: Merge config fragments
        run: |
          scripts/kconfig/merge_config.sh -m -O $OUT_DIR $OUT_DIR/.config \
            arch/arm64/configs/vendor/xiaomi/sdm845-common.config \
            arch/arm64/configs/vendor/xiaomi/beryllium.config || true

      - name: Disable LTO (FIX)
        run: |
          scripts/config --file out/.config -d LTO_CLANG || true
          scripts/config --file out/.config -d THINLTO || true
          make O=$OUT_DIR ARCH=arm64 olddefconfig

      - name: Disable Stack Protector (FIX)
        run: |
          scripts/config --file out/.config -d CC_STACKPROTECTOR_STRONG || true
          scripts/config --file out/.config -d CC_STACKPROTECTOR || true
          make O=$OUT_DIR ARCH=arm64 olddefconfig

      - name: Build DTBs (FIX ARM32)
        run: |
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          make -j$(nproc --all) \
            O=$OUT_DIR \
            ARCH=arm64 \
            CC=clang-14 \
            HOSTCC=clang-14 \
            HOSTCXX=clang++-14 \
            LD=ld.lld-14 \
            AR=llvm-ar-14 \
            NM=llvm-nm-14 \
            OBJCOPY=llvm-objcopy-14 \
            OBJDUMP=llvm-objdump-14 \
            STRIP=llvm-strip-14 \
            READELF=llvm-readelf-14 \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            LLVM=1 \
            LLVM_IAS=1 \
            dtbs

      - name: Build kernel
        run: |
          make -j$(nproc --all) \
            O=$OUT_DIR \
            ARCH=arm64 \
            CC=clang-14 \
            HOSTCC=clang-14 \
            HOSTCXX=clang++-14 \
            LD=ld.lld-14 \
            AR=llvm-ar-14 \
            NM=llvm-nm-14 \
            OBJCOPY=llvm-objcopy-14 \
            OBJDUMP=llvm-objdump-14 \
            STRIP=llvm-strip-14 \
            READELF=llvm-readelf-14 \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            LLVM=1 \
            LLVM_IAS=1

      - name: Check output
        run: |
          if [ -f "$OUT_DIR/arch/arm64/boot/Image.gz-dtb" ]; then
            echo "===================================="
            echo "NGK BUILD SUCCESS (FULL FIXED)"
            echo "$OUT_DIR/arch/arm64/boot/Image.gz-dtb"
            echo "===================================="
          else
            echo "BUILD FAILED"
            exit 1
          fi

      - name: Upload kernel
        uses: actions/upload-artifact@v4
        with:
          name: NGK-s-caf-FULL-FIXED
          path: out/arch/arm64/boot/*
