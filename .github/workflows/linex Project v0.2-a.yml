# linex Project - SilverCore Kernel (beryllium)
name: linex Project v0.2-kyy

on:
  workflow_dispatch:
    inputs:
      ubuntu:
        description: 'Run on'
        default: 'ubuntu-latest'
        required: true
        type: string
      name:
        description: 'Kernel Name'
        default: 'SilverCore-beryllium-GCC'
        required: true
        type: string
      kernel-source:
        description: 'kernel-source'
        default: 'https://github.com/PainKiller3/android_kernel_xiaomi_sdm845.git'
        required: true
        type: string
      kernel-branch:
        description: 'kernel-branch'
        default: 'ten'
        required: true
        type: string
      kernel-config:
        description: 'kernel-config'
        default: 'beryllium_defconfig'
        required: true
        type: string
      kernelsu:
        description: 'KernelSU (true/false)'
        default: 'false'
        required: true
        type: string

jobs:
  build-kernel:
    runs-on: ${{ inputs.ubuntu }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update --fix-missing
          sudo apt-get install -y git curl bc bison flex make \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
            binutils-aarch64-linux-gnu binutils-arm-linux-gnueabi \
            libssl-dev libelf-dev python3 zip

      - name: Clone Kernel Source
        run: |
          git clone --depth=1 ${{ inputs.kernel-source }} -b ${{ inputs.kernel-branch }} kernel-dir

      - name: Compile Kernel
        working-directory: ./kernel-dir
        run: |
          mkdir -p ../../out
          
          export KBUILD_BUILD_USER="linex"
          export KBUILD_BUILD_HOST="project"
          export ARCH=arm64
          export SUBARCH=arm64
          
          # Disable LTO & LLVM related configs
          echo "CONFIG_LTO_NONE=y" >> ../../out/.config
          echo "CONFIG_LTO_CLANG=n" >> ../../out/.config
          echo "CONFIG_THINLTO=n" >> ../../out/.config
          
          echo "=== Using defconfig: ${{ inputs.kernel-config }} ==="
          make O=../../out ARCH=arm64 ${{ inputs.kernel-config }}
          
          echo "=== Starting build with Pure GCC ==="
          make -j$(nproc) O=../../out ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            CROSS_COMPILE_COMPAT=arm-linux-gnueabi- \
            LD=aarch64-linux-gnu-ld.bfd \
            AR=aarch64-linux-gnu-ar \
            NM=aarch64-linux-gnu-nm \
            OBJCOPY=aarch64-linux-gnu-objcopy \
            OBJDUMP=aarch64-linux-gnu-objdump \
            STRIP=aarch64-linux-gnu-strip

      - name: Prepare AnyKernel3
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git AnyKernel3
          cd AnyKernel3
          rm -rf .git .github LICENSE README.md modules patch ramdisk
          cd ..
          
          if [[ -f out/arch/arm64/boot/Image.gz-dtb ]]; then
            cp out/arch/arm64/boot/Image.gz-dtb AnyKernel3/Image.gz-dtb
          elif [[ -f out/arch/arm64/boot/Image.gz ]]; then
            cp out/arch/arm64/boot/Image.gz AnyKernel3/Image.gz
          elif [[ -f out/arch/arm64/boot/Image ]]; then
            cp out/arch/arm64/boot/Image AnyKernel3/Image
          fi
          
          if [[ -f out/arch/arm64/boot/dtbo.img ]]; then
            cp out/arch/arm64/boot/dtbo.img AnyKernel3/dtbo.img
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.name }}
          path: AnyKernel3/*
          retention-days: 30
          
