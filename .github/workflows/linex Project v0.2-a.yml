name: NGK Kernel Build (LLVM17 STABLE FINAL)

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout NGK kernel
        uses: actions/checkout@v4
        with:
          repository: Pierre2324/NGK_android_kernel_xiaomi_sdm845
          ref: s-caf

      - name: Install LLVM 17 & dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            clang-17 lld-17 llvm-17 \
            gcc-arm-linux-gnueabi gcc-arm-linux-gnueabihf \
            bc bison flex libssl-dev \
            build-essential git python3 curl wget

          clang-17 --version

      - name: Export environment
        run: |
          echo "KBUILD_BUILD_USER=ducky" >> $GITHUB_ENV
          echo "KBUILD_BUILD_HOST=lotsofduck" >> $GITHUB_ENV
          echo "ARCH=arm64" >> $GITHUB_ENV
          echo "SUBARCH=arm64" >> $GITHUB_ENV
          echo "OUT_DIR=out" >> $GITHUB_ENV
          echo "CROSS_COMPILE_ARM32=arm-linux-gnueabi-" >> $GITHUB_ENV

      - name: Clean build
        run: |
          rm -rf out
          mkdir -p out

      - name: Load defconfig
        run: |
          if [ -f arch/arm64/configs/beryllium_defconfig ]; then
            make O=$OUT_DIR ARCH=arm64 beryllium_defconfig
          else
            make O=$OUT_DIR ARCH=arm64 sdm845_defconfig
          fi

      - name: Merge config fragments
        run: |
          scripts/kconfig/merge_config.sh -m -O $OUT_DIR $OUT_DIR/.config \
            arch/arm64/configs/vendor/xiaomi/sdm845-common.config \
            arch/arm64/configs/vendor/xiaomi/beryllium.config || true

      - name: Disable problematic configs (LTO + STACK FIX)
        run: |
          scripts/config --file out/.config -d LTO_CLANG || true
          scripts/config --file out/.config -d THINLTO || true
          scripts/config --file out/.config -d CC_STACKPROTECTOR_STRONG || true
          scripts/config --file out/.config -d CC_STACKPROTECTOR || true
          make O=$OUT_DIR ARCH=arm64 olddefconfig

      - name: Build DTBs (ARM32 FIX INCLUDED)
        run: |
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          make -j$(nproc --all) \
            O=$OUT_DIR \
            ARCH=arm64 \
            CC=clang-17 \
            HOSTCC=clang-17 \
            HOSTCXX=clang++-17 \
            LD=ld.lld-17 \
            AR=llvm-ar-17 \
            NM=llvm-nm-17 \
            OBJCOPY=llvm-objcopy-17 \
            OBJDUMP=llvm-objdump-17 \
            STRIP=llvm-strip-17 \
            READELF=llvm-readelf-17 \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            LLVM=1 \
            LLVM_IAS=1 \
            dtbs

      - name: Build kernel
        run: |
          make -j$(nproc --all) \
            O=$OUT_DIR \
            ARCH=arm64 \
            CC=clang-17 \
            HOSTCC=clang-17 \
            HOSTCXX=clang++-17 \
            LD=ld.lld-17 \
            AR=llvm-ar-17 \
            NM=llvm-nm-17 \
            OBJCOPY=llvm-objcopy-17 \
            OBJDUMP=llvm-objdump-17 \
            STRIP=llvm-strip-17 \
            READELF=llvm-readelf-17 \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            LLVM=1 \
            LLVM_IAS=1

      - name: Check output
        run: |
          if [ -f "$OUT_DIR/arch/arm64/boot/Image.gz-dtb" ]; then
            echo "===================================="
            echo "NGK BUILD SUCCESS (LLVM17 STABLE)"
            echo "$OUT_DIR/arch/arm64/boot/Image.gz-dtb"
            echo "===================================="
          else
            echo "BUILD FAILED"
            exit 1
          fi

      - name: Upload kernel
        uses: actions/upload-artifact@v4
        with:
          name: NGK-s-caf-LLVM17
          path: out/arch/arm64/boot/*
