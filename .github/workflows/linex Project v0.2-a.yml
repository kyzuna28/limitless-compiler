# linex Project
name: linex Project v0.2-a
on:
  workflow_dispatch:
    inputs:
      ubuntu:
        description: 'Run on'
        default: 'ubuntu-latest'
        required: true
        type: string
      name:
        description: 'Name'
        default: '4.9-beryllium'
        required: true
        type: string
      kernel-source:
        description: 'kernel-source'
        default: 'https://github.com/PainKiller3/android_kernel_xiaomi_sdm845.git'
        required: true
        type: string
      kernel-branch:
        description: 'kernel-branch'
        default: 'ten'
        required: true
        type: string
      kernel-config:
        description: 'kernel-config'
        default: 'beryllium_defconfig'
        required: true
        type: string
      kernelsu:
        description: 'KernelSU | false if kernel-source not support'
        default: 'false'
        required: true
        type: string
      compiler:
        description: 'compiler | gcc|clang|llvm'
        default: 'clang'
        required: true
        type: string
jobs:
  linex-compiler-example:
    runs-on: ${{ inputs.ubuntu }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Compile
      run: |
       sudo apt-get update --fix-missing && sudo apt-get install -y git curl bc bison flex make clang llvm lld binutils-aarch64-linux-gnu gcc-arm-linux-gnueabi gcc-arm-linux-gnueabihf libssl-dev libelf-dev python3 && mkdir -p $HOME/gcc-64 $HOME/gcc-32 $HOME/clang out && aria2c -o gcc-aarch64.tar.gz https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9/+archive/refs/tags/android-12.1.0_r27.tar.gz && tar -C $HOME/gcc-64 -zxf gcc-aarch64.tar.gz && aria2c -o gcc-arm.tar.gz https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9/+archive/refs/tags/android-12.1.0_r27.tar.gz && tar -C $HOME/gcc-32 -zxf gcc-arm.tar.gz && aria2c -o aosp-clang.tar.gz https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/tags/android-11.0.0_r46/clang-r383902b1.tar.gz && tar -C $HOME/clang -zxf aosp-clang.tar.gz && git clone --depth=1 ${{ inputs.kernel-source }} -b ${{ inputs.kernel-branch }} kernel-dir && cd kernel-dir && export KBUILD_BUILD_USER=linex KBUILD_BUILD_HOST=project && make O=../out ${{ inputs.kernel-config }} ARCH=arm64 && make -j$(nproc) O=../out CC=clang CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-gnu- LLVM=1 LLVM_IAS=1
    - name: AnyKernel3
      run: |
          git clone https://github.com/osm0sis/AnyKernel3 AnyKernel3
          rm -rf AnyKernel3/.git AnyKernel3/.github AnyKernel3/LICENSE AnyKernel3/README.md AnyKernel3/modules AnyKernel3/patch AnyKernel3/ramdisk
          if [[ -f out/arch/arm64/boot/Image.gz-dtb ]]; then
            cp out/arch/arm64/boot/Image.gz-dtb AnyKernel3/Image.gz-dtb
          elif [[ -f out/arch/arm64/boot/Image-dtb ]]; then
            cp out/arch/arm64/boot/Image-dtb AnyKernel3/Image-dtb
          elif [[ -f out/arch/arm64/boot/Image.gz ]]; then
            cp out/arch/arm64/boot/Image.gz AnyKernel3/Image.gz
          elif [[ -f out/arch/arm64/boot/Image ]]; then
            cp out/arch/arm64/boot/Image AnyKernel3/Image
          fi
          if [ -f out/arch/arm64/boot/dtbo.img ]; then
            cp out/arch/arm64/boot/dtbo.img AnyKernel3/dtbo.img
          fi
    - name: Upload
      run: |
          mkdir Upload
          cp -rf AnyKernel3/* Upload
    - id: Artifact
      uses: actions/upload-artifact@v4
      with:
        name: "${{ inputs.name }}"
        path: Upload/*
        
# Enjoy Your Life....
