name: NGK Kernel Build (s-caf)

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout NGK kernel (s-caf)
        uses: actions/checkout@v4
        with:
          repository: Pierre2324/NGK_android_kernel_xiaomi_sdm845
          ref: s-caf

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            bc bison flex libssl-dev \
            build-essential git \
            clang lld llvm \
            python3 curl wget

      - name: Setup LLVM (stable)
        run: |
          echo "Using system LLVM"
          clang --version
          ld.lld --version

      - name: Export build environment
        run: |
          echo "KBUILD_BUILD_USER=ducky" >> $GITHUB_ENV
          echo "KBUILD_BUILD_HOST=lotsofduck" >> $GITHUB_ENV
          echo "ARCH=arm64" >> $GITHUB_ENV
          echo "SUBARCH=arm64" >> $GITHUB_ENV
          echo "OUT_DIR=out" >> $GITHUB_ENV

      - name: Clean build
        run: |
          rm -rf out
          mkdir -p out

      - name: Detect defconfig
        run: |
          echo "Searching defconfig..."
          ls arch/arm64/configs | grep -i defconfig || true

      - name: Load defconfig (auto fallback)
        run: |
          if [ -f arch/arm64/configs/beryllium_defconfig ]; then
            make O=$OUT_DIR ARCH=arm64 beryllium_defconfig
          elif [ -f arch/arm64/configs/sdm845_defconfig ]; then
            make O=$OUT_DIR ARCH=arm64 sdm845_defconfig
          else
            echo "No known defconfig found!"
            exit 1
          fi

      - name: Merge config fragments (safe)
        run: |
          if [ -f arch/arm64/configs/vendor/xiaomi/sdm845-common.config ]; then
            scripts/kconfig/merge_config.sh -m -O $OUT_DIR $OUT_DIR/.config \
              arch/arm64/configs/vendor/xiaomi/sdm845-common.config \
              arch/arm64/configs/vendor/xiaomi/beryllium.config || true
          else
            echo "No vendor fragments found, skipping..."
          fi

      - name: Update config
        run: |
          make O=$OUT_DIR ARCH=arm64 olddefconfig

      - name: Build DTBs
        run: |
          make -j$(nproc --all) O=$OUT_DIR ARCH=arm64 dtbs

      - name: Build kernel
        run: |
          make -j$(nproc --all) \
            O=$OUT_DIR \
            ARCH=arm64 \
            CC=clang \
            HOSTCC=clang \
            HOSTCXX=clang++ \
            LD=ld.lld \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            READELF=llvm-readelf \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            LLVM=1 \
            LLVM_IAS=1

      - name: Check output
        run: |
          if [ -f "$OUT_DIR/arch/arm64/boot/Image.gz-dtb" ]; then
            echo "===================================="
            echo "NGK BUILD SUCCESS"
            echo "$OUT_DIR/arch/arm64/boot/Image.gz-dtb"
            echo "===================================="
          else
            echo "BUILD FAILED"
            exit 1
          fi

      - name: Upload kernel artifact
        uses: actions/upload-artifact@v4
        with:
          name: NGK-Kernel-s-caf
          path: out/arch/arm64/boot/*
