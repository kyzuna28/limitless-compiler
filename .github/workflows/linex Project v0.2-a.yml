name: Build NGK Kernel Beryllium (s-caf)

on:
  push:
    tags:
      - "C-*"

jobs:
  build:
    name: Build NGK Beryllium Kernel (No LTO)
    runs-on: ubuntu-24.04

    steps:
      - name: Set Timezone
        uses: szenius/set-timezone@v1.2
        with:
          timezoneLinux: "Asia/Shanghai"

      - name: Setup Swap 5GB
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 5

      - name: Cleanup
        run: |
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      - name: Get Tag
        id: tag
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git bc bison flex build-essential libssl-dev libelf-dev python3

      - name: Clone NGK Kernel Source
        run: |
          git clone -b s-caf --depth=1 https://github.com/Pierre2324/NGK_android_kernel_xiaomi_sdm845.git kernel
          cd kernel
          git submodule update --init --recursive

      - name: Get Toolchains
        run: |
          mkdir -p toolchain

          git clone --depth 1 https://github.com/LineageOS/android_prebuilts_clang_kernel_linux-x86_clang-r416183b.git toolchain/clang
          git clone --depth 1 https://github.com/KJ-Network/gcc-linaro-7.5.0-2019.12-x86_64_arm-linux-gnueabi.git toolchain/gcc32
          git clone --depth 1 https://github.com/KJ-Network/gcc-linaro-7.5.0-2019.12-x86_64_aarch64-linux-gnu.git toolchain/gcc64

      - name: Build Kernel (NO LTO)
        run: |
          cd kernel

          export ARCH=arm64
          export SUBARCH=arm64
          export KBUILD_BUILD_USER=$(echo ${{ github.actor }} | tr A-Z a-z)
          export KBUILD_BUILD_HOST=Github-Action
          export LOCALVERSION="-${{ steps.tag.outputs.TAG }}"

          export PATH=$GITHUB_WORKSPACE/toolchain/clang/bin:$PATH

          export CROSS_COMPILE=$GITHUB_WORKSPACE/toolchain/gcc64/bin/aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=$GITHUB_WORKSPACE/toolchain/gcc32/bin/arm-linux-gnueabi-

          make O=out beryllium_defconfig

          # 🔴 FORCE DISABLE LTO
          export LTO=none
          export LLVM=1
          export LLVM_IAS=1

          make -j$(nproc) O=out \
            CC=clang \
            LLVM=1 \
            LLVM_IAS=1 \
            LTO=none

      - name: Pack Kernel
        run: |
          mkdir -p AnyKernel

          cp kernel/out/arch/arm64/boot/Image AnyKernel/ 2>/dev/null || true
          cp kernel/out/arch/arm64/boot/Image.gz AnyKernel/ 2>/dev/null || true
          cp kernel/out/arch/arm64/boot/dts/**/*.dtb AnyKernel/ 2>/dev/null || true

          echo "NGK Beryllium Kernel - ${{ steps.tag.outputs.TAG }} (NO LTO)" > AnyKernel/version.txt

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NGK_Beryllium_NO_LTO_${{ steps.tag.outputs.TAG }}
          path: AnyKernel/*
