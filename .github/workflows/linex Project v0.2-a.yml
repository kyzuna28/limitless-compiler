# SilverCore Kernel - Branch TEN
name: Build SilverCore Kernel (ten)

on:
  workflow_dispatch:
    inputs:
      name:
        description: 'Nama Kernel'
        default: 'SilverCore-beryllium-ten'
        required: true
        type: string
      kernel-branch:
        description: 'Branch Kernel'
        default: 'ten'
        required: true
        type: string
      kernel-config:
        description: 'Defconfig'
        default: 'beryllium_defconfig'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Action
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update --fix-missing
          sudo apt-get install -y \
            git curl bc bison flex make python3 \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
            binutils-aarch64-linux-gnu binutils-arm-linux-gnueabi \
            libssl-dev libelf-dev zip

      - name: Clone Kernel Source
        run: |
          git clone --depth=1 https://github.com/PainKiller3/android_kernel_xiaomi_sdm845.git -b ${{ inputs.kernel-branch }} kernel-dir

      - name: Build Kernel
        working-directory: ./kernel-dir
        run: |
          mkdir -p ../../out
          
          export KBUILD_BUILD_USER="dzaky"
          export KBUILD_BUILD_HOST="github"
          export ARCH=arm64
          export SUBARCH=arm64
          
          # Fix common issues on old 4.9 kernel
          echo "CONFIG_LTO_NONE=y" >> ../../out/.config 2>/dev/null || true
          echo "CONFIG_LTO_CLANG=n" >> ../../out/.config 2>/dev/null || true
          echo "CONFIG_THINLTO=n" >> ../../out/.config 2>/dev/null || true
          
          echo "=== Using defconfig: ${{ inputs.kernel-config }} ==="
          make O=../../out ARCH=arm64 ${{ inputs.kernel-config }}
          
          echo "=== Starting compilation (GCC) ==="
          make -j$(nproc) O=../../out ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            LD=aarch64-linux-gnu-ld.bfd \
            AR=aarch64-linux-gnu-ar \
            NM=aarch64-linux-gnu-nm \
            OBJCOPY=aarch64-linux-gnu-objcopy \
            OBJDUMP=aarch64-linux-gnu-objdump \
            STRIP=aarch64-linux-gnu-strip

      - name: Package with AnyKernel3
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git AnyKernel3
          cd AnyKernel3
          rm -rf .git .github LICENSE README.md modules patch ramdisk
          cd ..
          
          # Copy hasil compile
          if [ -f out/arch/arm64/boot/Image.gz-dtb ]; then
            cp out/arch/arm64/boot/Image.gz-dtb AnyKernel3/Image.gz-dtb
          elif [ -f out/arch/arm64/boot/Image.gz ]; then
            cp out/arch/arm64/boot/Image.gz AnyKernel3/Image.gz
          else
            cp out/arch/arm64/boot/Image AnyKernel3/Image
          fi

      - name: Upload Kernel
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.name }}
          path: AnyKernel3/*
          retention-days: 30
          
