name: Build SilverCore Kernel (ten)

on:
  workflow_dispatch:
    inputs:
      name:
        description: 'Nama Kernel'
        default: 'SilverCore-beryllium-ten'
        required: true
        type: string
      kernel-branch:
        description: 'Branch'
        default: 'ten'
        required: true
        type: string
      kernel-config:
        description: 'Defconfig'
        default: 'beryllium_defconfig'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git bc bison flex make python3 libssl-dev libelf-dev \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi binutils-aarch64-linux-gnu \
            binutils-arm-linux-gnueabi zip

      - name: Clone Kernel
        run: git clone --depth=1 https://github.com/PainKiller3/android_kernel_xiaomi_sdm845.git -b ${{ inputs.kernel-branch }} kernel-dir

      - name: Build Kernel
        working-directory: ./kernel-dir
        run: |
          mkdir -p ../../out
          
          export KBUILD_BUILD_USER="dzaky"
          export KBUILD_BUILD_HOST="github"
          export ARCH=arm64
          
          # Fix common issues kernel 4.9
          sed -i 's/-mfix-cortex-a53-843419//g' arch/arm64/Makefile || true
          
          echo "CONFIG_LTO_NONE=y" >> ../../out/.config 2>/dev/null || true
          
          echo "=== Defconfig ==="
          make O=../../out ARCH=arm64 ${{ inputs.kernel-config }}
          
          echo "=== Building with GCC ==="
          make -j$(nproc) O=../../out ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            LD=aarch64-linux-gnu-ld.bfd \
            AR=aarch64-linux-gnu-ar \
            NM=aarch64-linux-gnu-nm \
            OBJCOPY=aarch64-linux-gnu-objcopy \
            OBJDUMP=aarch64-linux-gnu-objdump \
            STRIP=aarch64-linux-gnu-strip \
            KBUILD_CFLAGS+="-Wno-error" \
            KBUILD_AFLAGS+="-Wno-error"

      - name: Package Kernel
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git AnyKernel3
          cd AnyKernel3 && rm -rf .git .github LICENSE README.md modules patch ramdisk && cd ..
          
          if [ -f out/arch/arm64/boot/Image.gz-dtb ]; then
            cp out/arch/arm64/boot/Image.gz-dtb AnyKernel3/
          elif [ -f out/arch/arm64/boot/Image.gz ]; then
            cp out/arch/arm64/boot/Image.gz AnyKernel3/
          else
            cp out/arch/arm64/boot/Image AnyKernel3/
          fi

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.name }}
          path: AnyKernel3/*
          retention-days: 30
          
