name: SilverCore Kernel TEN 2

on:
  workflow_dispatch:
    inputs:
      name:
        description: 'Nama Output'
        default: 'SilverCore-ten'
        required: true

jobs:
  build:
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git bc bison flex make python3 \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
            binutils-aarch64-linux-gnu binutils-arm-linux-gnueabi \
            libssl-dev libelf-dev zip

      - name: Clone Kernel
        run: git clone --depth=1 https://github.com/PainKiller3/android_kernel_xiaomi_sdm845 -b ten kernel-dir

      - name: Build
        working-directory: kernel-dir
        run: |
          mkdir -p ../out
          
          export ARCH=arm64
          export KBUILD_BUILD_USER="dzaky"
          export KBUILD_BUILD_HOST="github"
          
          # Fix for old kernel
          sed -i '/-mfix-cortex-a53-843419/d' arch/arm64/Makefile || true
          
          echo "=== Defconfig ==="
          make O=../out beryllium_defconfig
          
          echo "=== Building... ==="
          make -j$(nproc) O=../out \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            LD=aarch64-linux-gnu-ld.bfd \
            KBUILD_CFLAGS+="-Wno-error -fno-pic" \
            KBUILD_AFLAGS+="-Wno-error"

      - name: AnyKernel3
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git AnyKernel3
          cd AnyKernel3
          rm -rf .git .github LICENSE README.md modules patch ramdisk
          cd ..
          
          cp kernel-dir/../out/arch/arm64/boot/Image.gz* AnyKernel3/ 2>/dev/null || \
          cp kernel-dir/../out/arch/arm64/boot/Image AnyKernel3/

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.name }}
          path: AnyKernel3/
          
