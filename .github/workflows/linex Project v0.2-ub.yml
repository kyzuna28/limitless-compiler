name: Build NGK Beryllium Kernel (LLVM20)

on:
  workflow_dispatch:
  push:
    tags:
      - "C-*"

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git bc bison flex build-essential libssl-dev libelf-dev python3

      - name: Setup LLVM Toolchain
        run: |
          mkdir -p $HOME/llvm-20.1.8-x86_64
          echo "NOTE: pastikan LLVM sudah tersedia atau cached"

      - name: Clone NGK Kernel (s-caf)
        run: |
          git clone -b s-caf https://github.com/Pierre2324/NGK_android_kernel_xiaomi_sdm845.git kernel
          cd kernel
          git submodule update --init --recursive

      - name: Build Kernel
        run: |
          # ===== TOOLCHAIN =====
          TL_PATH="$HOME/llvm-20.1.8-x86_64"
          export PATH="$TL_PATH/bin:$PATH"

          # ===== BUILD INFO =====
          export KBUILD_BUILD_USER="ducky"
          export KBUILD_BUILD_HOST="lotsofduck"

          # ===== ARCH =====
          export ARCH=arm64
          export SUBARCH=arm64

          # ===== OUT DIR =====
          OUT_DIR="out"

          # ===== DEFCONFIG =====
          DEFCONFIG="beryllium_defconfig"

          # ===== THREADS =====
          PROCS=$(nproc --all)

          # ===== CONFIG FRAGMENTS =====
          FRAG1="arch/arm64/configs/vendor/xiaomi/sdm845-common.config"
          FRAG2="arch/arm64/configs/vendor/xiaomi/beryllium.config"

          # ===== MAKE FLAGS =====
          MAKE_ARGS=(
            O=$OUT_DIR
            ARCH=arm64
            CC=clang
            HOSTCC=clang
            HOSTCXX=clang++
            LD=ld.lld
            AR=llvm-ar
            NM=llvm-nm
            OBJCOPY=llvm-objcopy
            OBJDUMP=llvm-objdump
            STRIP=llvm-strip
            READELF=llvm-readelf
            CLANG_TRIPLE=aarch64-linux-gnu-
            CROSS_COMPILE=aarch64-linux-gnu-
            CROSS_COMPILE_ARM32=arm-linux-gnueabi-
            LLVM=1
            LLVM_IAS=1
          )

          cd kernel

          echo "Cleaning..."
          rm -rf $OUT_DIR
          mkdir -p $OUT_DIR
