name: Poco F1 Kernel Compiler 3.1 GCC Pro tes
on:
  workflow_dispatch:
    inputs:
      zip_name:
        description: 'Nama File ZIP Akhir'
        default: 'Kyzuna-Beryllium-v3.1'
        required: true
        type: string
      kernel_name:
        description: 'Nama Utama Kernel'
        default: 'kyzuna'
        required: true
        type: string
      rom_type:
        description: 'Tipe ROM (nse / se / dynamic)'
        default: 'nse'
        required: true
        type: string
      project_name:
        description: 'Build Project User'
        default: 'kyy'
        required: true
        type: string
      kernel-url:
        description: 'Kernel Source URL'
        default: 'https://github.com/linex-17/Kyzuna.git'
        required: true
        type: string
      kernel-branch:
        description: 'Kernel Branch'
        default: 'main'
        required: true
        type: string
      kernel-config:
        description: 'Kernel Defconfig'
        default: 'beryllium_defconfig'
        required: true
        type: string
      kernelsu:
        description: 'KernelSU (ksu / next / false)'
        default: 'ksu'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Mempersiapkan Lingkungan Build
      run: |
         sudo timedatectl set-timezone Asia/Jakarta
         echo "Memulai Kompilasi Pure GCC Engine untuk Poco F1"

    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Solusi Anti-Stuck APT & Instalasi Dependensi
      run: |
         # Mengurangi beban interaksi apt dan menggunakan opsi timeout ketat
         sudo rm -rf /var/lib/apt/lists/*
         sudo apt-get update -o Acquire::ForceIPv4=true -o Acquire::Retries=3
         sudo apt-get install -o Acquire::ForceIPv4=true -o Acquire::Retries=3 --no-install-recommends -y bc aria2 zip tar libssl-dev flex bison make libelf-dev
         
         # Bersihkan Homebrew bawaan untuk menambah free RAM & Storage
         aria2c -q https://raw.githubusercontent.com/Homebrew/install/master/uninstall.sh && NONINTERACTIVE=1 bash ./uninstall.sh -f -q

    - name: Unduh Google Official GCC 4.9 Toolchains
      run: |
         mkdir -p $HOME/gcc-64 $HOME/gcc-32
         
         # Unduh via Aria2 dengan 16 koneksi paralel langsung ke server inti Google (Bypass Apt Azure yang macet)
         aria2c -s 16 -x 16 -k 1M -o gcc-64.tar.gz https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9/+archive/0a0604336d4d1067aa1aaef8d3779b31fcee841d.tar.gz
         tar -C $HOME/gcc-64 -zxf gcc-64.tar.gz
         
         aria2c -s 16 -x 16 -k 1M -o gcc-32.tar.gz https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9/+archive/4d16d93f49c2b5ecdd0f12c38d194835dd595603.tar.gz
         tar -C $HOME/gcc-32 -zxf gcc-32.tar.gz

    - name: Clone Kernel Source
      run: git clone --depth=1 ${{ inputs.kernel-url }} -b ${{ inputs.kernel-branch }} kernel-dir

    - name: Konfigurasi & Patching Defconfig
      run: |
         cd kernel-dir
         
         # Perbaikan script python lawas di lingkungan Ubuntu modern
         if [ -f scripts/gcc-wrapper.py ]; then
             sed -i 's/print >> sys.stderr, \(.*\)/print(\1, file=sys.stderr)/g' scripts/gcc-wrapper.py || true
         fi
         
         # Set identitas Kernel ke Defconfig
         sed -i 's/CONFIG_LOCALVERSION=.*/CONFIG_LOCALVERSION="-${{ inputs.kernel_name }}-${{ inputs.rom_type }}"/g' arch/arm64/configs/${{ inputs.kernel-config }}
         touch .scmversion
         
         # Pemasangan Otomatis Ekosistem Rooting
         if [ "${{ inputs.kernelsu }}" = "ksu" ]; then
            curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s v0.9.5
         elif [ "${{ inputs.kernelsu }}" = "next" ]; then
            curl -LSs "https://raw.githubusercontent.com/rifsxd/KernelSU-Next/next/kernel/setup.sh" | bash -s next
         fi

    - name: Proses Eksekusi Kompilasi Kernel
      run: |
         cd kernel-dir
         export PATH=$HOME/gcc-64/bin:$HOME/gcc-32/bin:$PATH
         
         export KBUILD_BUILD_USER="${{ inputs.project_name }}"
         export KBUILD_BUILD_HOST="limitless-labs"
         
         # Tambahan HOSTCFLAGS=-fcommon untuk mencegah error duplikasi yylloc di Ubuntu 24.04
         OPTS="ARCH=arm64 O=../out \
               CROSS_COMPILE=aarch64-linux-android- \
               CROSS_COMPILE_ARM32=arm-linux-androideabi- \
               HOSTCFLAGS=-fcommon"

         make $OPTS ${{ inputs.kernel-config }}
         make -j$(nproc --all) $OPTS 2>&1 | tee build.log
         
         # Pengecekan Hasil Akhir Kompilasi
         if [ ! -f ../out/arch/arm64/boot/Image.gz-dtb ] && [ ! -f ../out/arch/arm64/boot/Image.gz ] && [ ! -f ../out/arch/arm64/boot/Image ]; then
             echo "===================================================="
             echo "       COMPILATION FAILED - SHOWING LAST LOGS       "
             echo "===================================================="
             tail -n 300 build.log
             exit 1
         fi

    - name: Pembungkusan Flashable Zip (AnyKernel3)
      run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3 AnyKernel3
          rm -rf AnyKernel3/.git AnyKernel3/.github AnyKernel3/LICENSE AnyKernel3/README.md
          
          if [ -f out/arch/arm64/boot/Image.gz-dtb ]; then
              cp out/arch/arm64/boot/Image.gz-dtb AnyKernel3/Image.gz-dtb
          elif [ -f out/arch/arm64/boot/Image.gz ]; then
              cp out/arch/arm64/boot/Image.gz AnyKernel3/Image.gz
          else
              cp out/arch/arm64/boot/Image AnyKernel3/Image
          fi
          
          [ -f out/arch/arm64/boot/dtbo.img ] && cp out/arch/arm64/boot/dtbo.img AnyKernel3/dtbo.img || true
          
          cd AnyKernel3
          zip -r9 "../${{ inputs.zip_name }}-${{ inputs.rom_type }}.zip" *

    - name: Unggah Hasil Kompilasi
      uses: actions/upload-artifact@v4
      with:
        name: "${{ inputs.zip_name }}-${{ inputs.rom_type }}-GCC"
        path: "*.zip"
