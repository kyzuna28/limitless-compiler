name: Build NGK Beryllium Kernel (FIXED LLVM)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git bc bison flex build-essential libssl-dev libelf-dev python3 wget

      - name: Download Clang (AOSP r530567)
        run: |
          mkdir -p $HOME/clang
          wget -q https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r530567.tar.gz -O clang.tar.gz
          tar -xf clang.tar.gz -C $HOME/clang

      - name: Clone Kernel (NGK s-caf)
        run: |
          git clone -b s-caf https://github.com/Pierre2324/NGK_android_kernel_xiaomi_sdm845.git kernel

      - name: Build Kernel
        run: |
          cd kernel

          # ===== TOOLCHAIN =====
          export PATH=$HOME/clang/bin:$PATH

          # ===== BUILD INFO =====
          export KBUILD_BUILD_USER="miui"
          export KBUILD_BUILD_HOST="poco-f1"

          # ===== ARCH =====
          export ARCH=arm64
          export SUBARCH=arm64

          # ===== IMPORTANT FIX (NO CROSS COMPILE) =====
          export CROSS_COMPILE=""
          export CROSS_COMPILE_ARM32=""
          export CLANG_TRIPLE=aarch64-linux-gnu-

          # ===== DEFCONFIG =====
          make beryllium_defconfig

          # ===== FIX CONFIG =====
          make O=out olddefconfig

          # ===== BUILD =====
          make -j$(nproc) O=out \
            ARCH=arm64 \
            CC=clang \
            LLVM=1 \
            LLVM_IAS=1

      - name: Upload Kernel
        uses: actions/upload-artifact@v4
        with:
          name: NGK_Beryllium_FIXED
          path: kernel/out/arch/arm64/boot/*
