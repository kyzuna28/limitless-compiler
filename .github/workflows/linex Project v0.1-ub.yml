name: Kernel Build (LawRun SDM845)

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git bc bison flex make clang llvm lld \
          libssl-dev libelf-dev gcc-aarch64-linux-gnu \
          zip unzip python3 wget curl

      - name: Setup environment
        run: |
          echo "ARCH=arm64" >> $GITHUB_ENV
          echo "SUBARCH=arm64" >> $GITHUB_ENV
          echo "KBUILD_BUILD_USER=github" >> $GITHUB_ENV
          echo "KBUILD_BUILD_HOST=actions" >> $GITHUB_ENV

      - name: Make defconfig
        run: |
          make O=out ARCH=arm64 LawRun_defconfig

      - name: Build kernel
        run: |
          make -j$(nproc --all) O=out \
          ARCH=arm64 \
          CC=clang \
          LLVM=1 LLVM_IAS=1 \
          CROSS_COMPILE=aarch64-linux-gnu-

      - name: Package kernel image
        run: |
          mkdir -p release
          cp out/arch/arm64/boot/Image* release/ 2>/dev/null || true
          cp out/arch/arm64/boot/dtb* release/ 2>/dev/null || true
          cd release
          zip -r9 Kernel-LawRun-sdm845.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LawRun-Kernel
          path: release/Kernel-LawRun-sdm845.zip
