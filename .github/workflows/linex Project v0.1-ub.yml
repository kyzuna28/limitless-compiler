name: Build MIUI Kernel 4.9 (Poco F1)

on:
  workflow_dispatch:
  push:
    tags:
      - "M-*"

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git bc bison flex build-essential libssl-dev libelf-dev python3 zip

      - name: Download Clang (AOSP r530567)
        run: |
          mkdir -p $HOME/clang
          wget -q https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r530567.tar.gz -O clang.tar.gz
          tar -xf clang.tar.gz -C $HOME/clang

      - name: Clone Kernel Source (MIUI 4.9)
        run: |
          git clone --depth=1 https://github.com/Pierre2324/NGK_android_kernel_xiaomi_sdm845.git kernel
          cd kernel

      - name: Build Kernel
        run: |
          cd kernel

          # ===== TOOLCHAIN =====
          export PATH=$HOME/clang/bin:$PATH

          # ===== BUILD INFO =====
          export KBUILD_BUILD_USER="miui"
          export KBUILD_BUILD_HOST="poco-f1"

          # ===== ARCH =====
          export ARCH=arm64
          export SUBARCH=arm64

          # ===== CROSS =====
          export CROSS_COMPILE=aarch64-linux-android-
          export CROSS_COMPILE_ARM32=arm-linux-androideabi-
          export CLANG_TRIPLE=aarch64-linux-gnu-

          # ===== DEFCONFIG MIUI 4.9 =====
          make beryllium_defconfig

          # ===== BUILD =====
          make -j$(nproc) \
            O=out \
            CC=clang \
            LLVM=1 \
            LLVM_IAS=1

      - name: Pack AnyKernel3
        run: |
          git clone https://github.com/osm0sis/AnyKernel3 AnyKernel3

          cp kernel/out/arch/arm64/boot/Image AnyKernel3/ 2>/dev/null || true
          cp kernel/out/arch/arm64/boot/Image.gz AnyKernel3/ 2>/dev/null || true
          cp kernel/out/arch/arm64/boot/Image.gz-dtb AnyKernel3/ 2>/dev/null || true
          cp kernel/out/arch/arm64/boot/dtbo.img AnyKernel3/ 2>/dev/null || true

          rm -rf AnyKernel3/.git AnyKernel3/.github

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MIUI_4.9_PocoF1_Kernel
          path: AnyKernel3/*
