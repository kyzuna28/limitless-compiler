# linex Project
name: linex Project v0.1-ub
on:
  workflow_dispatch:
    inputs:
      ubuntu:
        description: 'Run on'
        default: 'ubuntu-latest'
        required: true
        type: string
jobs:
  build-kernel:
    runs-on: ${{ inputs.ubuntu }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install --no-install-recommends -y \
        git curl zip unzip bc bison flex \
        gcc-arm-linux-gnueabi gcc-aarch64-linux-gnu \
        libssl-dev build-essential libncurses-dev
    - name: Clone Kernel Source
      run: |
        git clone --depth=1 https://github.com/linex-17/Limitless.git -b main kernel-dir
        mkdir -p out
    - name: Compile
      run: |
          cd kernel-dir && export ARCH=arm64 && export SUBARCH=arm64 && export KBUILD_BUILD_USER="linex" && export KBUILD_BUILD_HOST="project" && export CROSS_COMPILE=aarch64-linux-gnu- && export CROSS_COMPILE_ARM32=arm-linux-gnueabi- && make O=../out ARCH=arm64 xi_defconfig && make -j$(nproc) O=../out ARCH=arm64
    - name: AnyKernel3
      run: |
          git clone https://github.com/osm0sis/AnyKernel3 AnyKernel3
          rm -rf AnyKernel3/.git AnyKernel3/.github AnyKernel3/LICENSE AnyKernel3/README.md AnyKernel3/modules AnyKernel3/patch AnyKernel3/ramdisk
          
          if [[ -f out/arch/arm64/boot/Image.gz-dtb ]]; then
            cp out/arch/arm64/boot/Image.gz-dtb AnyKernel3/Image.gz-dtb
          elif [[ -f out/arch/arm64/boot/Image-dtb ]]; then
            cp out/arch/arm64/boot/Image-dtb AnyKernel3/Image-dtb
          elif [[ -f out/arch/arm64/boot/Image.gz ]]; then
            cp out/arch/arm64/boot/Image.gz AnyKernel3/Image.gz
          elif [[ -f out/arch/arm64/boot/Image ]]; then
            cp out/arch/arm64/boot/Image AnyKernel3/Image
          fi
          if [ -f out/arch/arm64/boot/dtbo.img ]; then
            cp out/arch/arm64/boot/dtbo.img AnyKernel3/dtbo.img
          fi
    - name: Upload
      run: |
          mkdir Upload
          cp -rf AnyKernel3/* Upload
    - id: Artifact
      uses: actions/upload-artifact@v4
      with:
        name: "4.9-kernel"
        path: Upload/*
    
# Enjoy Your Life....
