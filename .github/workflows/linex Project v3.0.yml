# linex Project - Customized for Poco F1 (beryllium)
name: Poco F1 Kernel Compiler 3.0
on:
  workflow_dispatch:
    inputs:
      ubuntu:
        description: 'Run on'
        default: 'ubuntu-latest'
        required: true
        type: string
      zip_name:
        description: 'Nama File ZIP Akhir'
        default: 'Kyzuna-Beryllium'
        required: true
        type: string
      kernel_version:
        description: 'Versi Angka (Contoh: 4.9.239 atau 4.9.337)'
        default: '4.9.239'
        required: true
        type: string
      kernel_name:
        description: 'Nama Utama Kernel (Contoh: kyzuna, silvercore, dsb)'
        default: 'kyzuna'
        required: true
        type: string
      rom_type:
        description: 'Tipe ROM/Tag (Contoh: nse, se, dynamic)'
        default: 'nse'
        required: true
        type: string
      project_name:
        description: 'Build Project (@nama-project)'
        default: 'kyy'
        required: true
        type: string
      compiler:
        description: 'Compiler | gcc|clang|llvm'
        default: 'clang'
        required: true
        type: string
      aosp-clang:
        description: 'Clang Version (11/13/14/19/20) atau Link'
        default: '11'
        required: true
        type: string
      kernel-url:
        description: 'Kernel Source URL'
        default: 'https://github.com/linex-17/Kyzuna.git'
        required: true
        type: string
      kernel-branch:
        description: 'Kernel Branch'
        default: 'main'
        required: true
        type: string
      kernel-config:
        description: 'Kernel Config (Defconfig)'
        default: 'beryllium_defconfig'
        required: true
        type: string
      kernelsu:
        description: 'KernelSU (ksu/next/false)'
        default: 'ksu'
        required: true
        type: string
      disable-lto:
        description: 'Disable LTO'
        default: 'true'
        required: true
        type: string
      AK3:
        description: 'AnyKernel3 Template'
        default: 'https://github.com/osm0sis/AnyKernel3'
        required: true
        type: string

jobs:
  build:
    runs-on: ${{ inputs.ubuntu }}
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Instalasi Paket Dependensi
      run: |
         sudo apt-get update
         sudo apt-get install --no-install-recommends -y gcc-arm-linux-gnueabi gcc-aarch64-linux-gnu lld llvm g++-aarch64-linux-gnu bc aria2 zip tar libssl-dev flex bison
         aria2c -q https://raw.githubusercontent.com/Homebrew/install/master/uninstall.sh && NONINTERACTIVE=1 bash ./uninstall.sh -f -q

    - name: Optimasi Swap Space
      run: |
         if [ -f /bin/swapon ]; then
             export SWAP_FILE=$(swapon --show=NAME | tail -n 1)
             sudo swapoff $SWAP_FILE || true
             sudo rm $SWAP_FILE || true
             sudo fallocate -l 16G $SWAP_FILE
             sudo chmod 600 $SWAP_FILE
             sudo mkswap $SWAP_FILE
             sudo swapon $SWAP_FILE
         fi

    - name: Setup GCC & Clang
      run: |
         mkdir -p $HOME/gcc-64 $HOME/gcc-32 $HOME/clang
         aria2c -o gcc-64.tar.gz https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9/+archive/0a0604336d4d1067aa1aaef8d3779b31fcee841d.tar.gz
         tar -C $HOME/gcc-64 -zxf gcc-64.tar.gz
         aria2c -o gcc-32.tar.gz https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9/+archive/4d16d93f49c2b5ecdd0f12c38d194835dd595603.tar.gz
         tar -C $HOME/gcc-32 -zxf gcc-32.tar.gz
         if [ "${{ inputs.aosp-clang }}" = "11" ]; then
             URL="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/tags/android-11.0.0_r46/clang-r383902b1.tar.gz"
         elif [[ "${{ inputs.aosp-clang }}" == http* ]]; then
             URL="${{ inputs.aosp-clang }}"
         else
             URL="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r530567.tar.gz"
         fi
         aria2c -o clang.tar.gz "$URL"
         tar -C $HOME/clang -zxf clang.tar.gz

    - name: Clone Kernel Source
      run: git clone --depth=1 ${{ inputs.kernel-url }} -b ${{ inputs.kernel-branch }} kernel-dir

    - name: Konfigurasi Branding & APatch Fix
      run: |
         cd kernel-dir
         # 1. Force Kernel Version
         sed -i "s/^VERSION =.*/VERSION = $(echo ${{ inputs.kernel_version }} | cut -d. -f1)/" Makefile
         sed -i "s/^PATCHLEVEL =.*/PATCHLEVEL = $(echo ${{ inputs.kernel_version }} | cut -d. -f2)/" Makefile
         sed -i "s/^SUBLEVEL =.*/SUBLEVEL = $(echo ${{ inputs.kernel_version }} | cut -d. -f3)/" Makefile
         
         # 2. Localversion (nama-tag) -> Contoh: kyzuna-nse
         sed -i 's/CONFIG_LOCALVERSION=.*/CONFIG_LOCALVERSION=" ${{ inputs.kernel_name }}-${{ inputs.rom_type }}"/g' arch/arm64/configs/${{ inputs.kernel-config }}
         
         # 3. Matikan auto-plus (+)
         touch .scmversion
         export LOCALVERSION=""

         # 4. APatch Support (Wajib)
         echo "CONFIG_KALLSYMS=y" >> arch/arm64/configs/${{ inputs.kernel-config }}
         echo "CONFIG_KALLSYMS_ALL=y" >> arch/arm64/configs/${{ inputs.kernel-config }}
         echo "CONFIG_KPROBES=y" >> arch/arm64/configs/${{ inputs.kernel-config }}
         echo "CONFIG_HAVE_KPROBES=y" >> arch/arm64/configs/${{ inputs.kernel-config }}
         
         # 5. LTO & KernelSU Logic
         [ "${{ inputs.disable-lto }}" = "true" ] && (sed -i 's/CONFIG_LTO=y/CONFIG_LTO=n/' arch/arm64/configs/${{ inputs.kernel-config }}; echo "CONFIG_LTO_NONE=y" >> arch/arm64/configs/${{ inputs.kernel-config }}) || true
         if [ "${{ inputs.kernelsu }}" = "ksu" ]; then
            curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s v0.9.5
         elif [ "${{ inputs.kernelsu }}" = "next" ]; then
            curl -LSs "https://raw.githubusercontent.com/rifsxd/KernelSU-Next/next/kernel/setup.sh" | bash -s next
         fi

    - name: Proses Kompilasi
      run: |
         cd kernel-dir
         export PATH=$HOME/clang/bin:$HOME/gcc-64/bin:$HOME/gcc-32/bin:$PATH
         export KBUILD_BUILD_USER="${{ inputs.project_name }}"
         export KBUILD_BUILD_HOST="${{ inputs.project_name }}-project"
         
         OPTS="ARCH=arm64 O=../out"
         if [ "${{ inputs.compiler }}" = "clang" ]; then
            OPTS+=" CC=clang CROSS_COMPILE=aarch64-linux-android- CROSS_COMPILE_ARM32=arm-linux-androideabi- CLANG_TRIPLE=aarch64-linux-gnu-"
         fi

         make $OPTS ${{ inputs.kernel-config }}
         make -j$(nproc --all) $OPTS

    - name: Packaging
      run: |
          git clone --depth=1 ${{ inputs.AK3 }} AnyKernel3
          rm -rf AnyKernel3/.git AnyKernel3/.github
          sed -i "s/kernel.string=.*/kernel.string=${{ inputs.zip_name }}/g" AnyKernel3/anykernel.sh || true
          cp out/arch/arm64/boot/Image.gz-dtb AnyKernel3/Image.gz-dtb || cp out/arch/arm64/boot/Image.gz AnyKernel3/Image.gz || cp out/arch/arm64/boot/Image AnyKernel3/Image
          [ -f out/arch/arm64/boot/dtbo.img ] && cp out/arch/arm64/boot/dtbo.img AnyKernel3/dtbo.img || true
          cd AnyKernel3
          zip -r9 "../${{ inputs.zip_name }}-${{ inputs.rom_type }}.zip" *

    - name: Upload Build
      uses: actions/upload-artifact@v4
      with:
        name: "${{ inputs.zip_name }}-${{ inputs.rom_type }}"
        path: "*.zip"
