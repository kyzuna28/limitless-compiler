# linex Project - Customized for Poco F1 (beryllium)
# Version 2.8 Pro Full Final - Ultimate Stability
name: Poco F1 Kernel Compiler 2.8 Pro
on:
  workflow_dispatch:
    inputs:
      zip_name:
        description: 'Nama File ZIP Akhir'
        default: 'Kyzuna-Beryllium'
        required: true
      kernel_version:
        description: 'Isi angka (misal 4.19.1) atau biarkan "original"'
        default: 'original'
        required: true
      kernel_name:
        description: 'Nama Utama Kernel (Contoh: kyzuna)'
        default: 'kyzuna'
        required: true
      rom_type:
        description: 'Pilih Tipe ROM'
        default: 'nse'
        type: choice
        options:
        - nse
        - se
        - dynamic
        - aosp
      project_name:
        description: 'Build Project (@nama-project)'
        default: 'kyy'
        required: true
      compiler:
        description: 'Pilih Compiler (AOSP 11 paling stabil untuk 4.9)'
        default: 'aosp-clang'
        type: choice
        options:
        - aosp-clang
        - proton-clang
        - azure-clang
      kernel_url:
        description: 'Link Source Kernel'
        default: 'https://github.com/linex-17/Kyzuna.git'
        required: true
      kernel_branch:
        description: 'Branch Kernel'
        default: 'main'
        required: true
      kernel_config:
        description: 'Defconfig File'
        default: 'beryllium_defconfig'
        required: true
      lto_type:
        description: 'Optimasi LTO (Thin paling stabil)'
        default: 'thin'
        type: choice
        options:
        - thin
        - full
        - none
      kernelsu_version:
        description: 'Root Method'
        default: 'ksu'
        type: choice
        options:
        - ksu
        - next
        - false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Workflow
      uses: actions/checkout@v4

    - name: Setup Build Environment
      run: |
         sudo apt-get update && sudo apt-get install -y bc aria2 zip tar libssl-dev flex bison lld llvm make
         sudo timedatectl set-timezone Asia/Jakarta

    - name: Download Toolchains (Stable Hybrid)
      run: |
         mkdir -p $HOME/tc $HOME/gcc64 $HOME/gcc32
         # GCC 4.9 Wajib untuk kernel old (beryllium)
         aria2c -q -o gcc64.tar.gz https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9/+archive/0a0604336d4d1067aa1aaef8d3779b31fcee841d.tar.gz
         tar -C $HOME/gcc64 -zxf gcc64.tar.gz
         aria2c -q -o gcc32.tar.gz https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9/+archive/4d16d93f49c2b5ecdd0f12c38d194835dd595603.tar.gz
         tar -C $HOME/gcc32 -zxf gcc32.tar.gz
         # Compiler Picker Logic
         if [ "${{ inputs.compiler }}" = "aosp-clang" ]; then
            URL="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/tags/android-11.0.0_r46/clang-r383902b1.tar.gz"
         elif [ "${{ inputs.compiler }}" = "proton-clang" ]; then
            URL="https://github.com/kdrag0n/proton-clang/archive/refs/heads/master.tar.gz"
         elif [ "${{ inputs.compiler }}" = "azure-clang" ]; then
            URL="https://gitlab.com/Panchajanya1999/azure-clang/-/archive/master/azure-clang-master.tar.gz"
         fi
         aria2c -q -o tc.tar.gz "$URL"
         tar -C $HOME/tc -zxf tc.tar.gz

    - name: Clone Kernel Source
      run: git clone --depth=1 ${{ inputs.kernel_url }} -b ${{ inputs.kernel_branch }} kernel-dir

    - name: Pro Configuration Engine
      run: |
         cd kernel-dir
         # 1. Makefile Versioning Logic
         if [ "${{ inputs.kernel_version }}" != "original" ] && [ "${{ inputs.kernel_version }}" != "" ]; then
             sed -i "s/^VERSION =.*/VERSION = $(echo ${{ inputs.kernel_version }} | cut -d. -f1)/" Makefile
             sed -i "s/^PATCHLEVEL =.*/PATCHLEVEL = $(echo ${{ inputs.kernel_version }} | cut -d. -f2)/" Makefile
             sed -i "s/^SUBLEVEL =.*/SUBLEVEL = $(echo ${{ inputs.kernel_version }} | cut -d. -f3)/" Makefile
         fi
         # 2. Branding (Contoh: kyzuna-nse)
         sed -i 's/CONFIG_LOCALVERSION=.*/CONFIG_LOCALVERSION=" ${{ inputs.kernel_name }}-${{ inputs.rom_type }}"/g' arch/arm64/configs/${{ inputs.kernel_config }}
         touch .scmversion
         export LOCALVERSION=""
         # 3. APatch & KProbes Fix
         echo "CONFIG_KALLSYMS=y" >> arch/arm64/configs/${{ inputs.kernel_config }}
         echo "CONFIG_KALLSYMS_ALL=y" >> arch/arm64/configs/${{ inputs.kernel_config }}
         echo "CONFIG_KPROBES=y" >> arch/arm64/configs/${{ inputs.kernel-config }}
         echo "CONFIG_HAVE_KPROBES=y" >> arch/arm64/configs/${{ inputs.kernel-config }}
         # 4. LTO Management
         if [ "${{ inputs.lto_type }}" = "none" ]; then
             sed -i 's/CONFIG_LTO=y/CONFIG_LTO=n/' arch/arm64/configs/${{ inputs.kernel-config }} || true
             sed -i 's/CONFIG_LTO_CLANG=y/CONFIG_LTO_CLANG=n/' arch/arm64/configs/${{ inputs.kernel-config }} || true
             echo "CONFIG_LTO_NONE=y
