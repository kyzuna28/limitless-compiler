# linex Project - Customized for Poco F1 (beryllium)
name: Poco F1 Kernel Compiler 2.4
on:
  workflow_dispatch:
    inputs:
      ubuntu:
        description: 'Run on'
        default: 'ubuntu-latest'
        required: true
        type: string
      name:
        description: 'Nama File Output'
        default: 'Limitless-Beryllium-Android10'
        required: true
        type: string
      compiler:
        description: 'Compiler | gcc|clang|llvm'
        default: 'clang'
        required: true
        type: string
      aosp-clang:
        description: 'Clang Version (11/13/14/19/20) atau Link'
        default: '11' # Clang 11 paling stabil untuk kernel 4.9 Android 10
        required: true
        type: string
      kernel-url:
        description: 'Kernel Source URL'
        default: 'https://github.com/linex-17/Limitless.git'
        required: true
        type: string
      kernel-branch:
        description: 'Kernel Branch'
        default: 'main'
        required: true
        type: string
      kernel-config:
        description: 'Kernel Config (Defconfig)'
        default: 'beryllium_defconfig' # Defconfig standar Poco F1
        required: true
        type: string
      kernelsu:
        description: 'KernelSU (ksu/next/false)'
        default: 'ksu'
        required: true
        type: string
      disable-lto:
        description: 'Disable LTO (Gunakan true jika compile gagal)'
        default: 'true'
        required: true
        type: string
      AK3:
        description: 'AnyKernel3 Template'
        default: 'https://github.com/osm0sis/AnyKernel3'
        required: true
        type: string

jobs:
  build:
    runs-on: ${{ inputs.ubuntu }}
    steps:
    - name: Mempersiapkan Lingkungan Build
      run: |
         echo "Building for: Poco F1 (beryllium)"
         echo "Target OS: MIUI 12 / Android 10"
         sudo timedatectl set-timezone Asia/Jakarta

    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Instalasi Paket Dependensi
      run: |
         sudo apt-get update
         sudo apt-get install --no-install-recommends -y gcc-arm-linux-gnueabi gcc-aarch64-linux-gnu lld llvm g++-aarch64-linux-gnu bc aria2 zip tar
         aria2c -q https://raw.githubusercontent.com/Homebrew/install/master/uninstall.sh && NONINTERACTIVE=1 bash ./uninstall.sh -f -q

    - name: Optimasi Swap Space
      run: |
         if [ -f /bin/swapon ]; then
             export SWAP_FILE=$(swapon --show=NAME | tail -n 1)
             sudo swapoff $SWAP_FILE || true
             sudo rm $SWAP_FILE || true
             sudo fallocate -l 16G $SWAP_FILE
             sudo chmod 600 $SWAP_FILE
             sudo mkswap $SWAP_FILE
             sudo swapon $SWAP_FILE
         fi

    - name: Setup GCC (Toolchain Pendukung)
      run: |
         mkdir -p $HOME/gcc-64 $HOME/gcc-32
         aria2c -o gcc-aarch64.tar.gz https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9/+archive/0a0604336d4d1067aa1aaef8d3779b31fcee841d.tar.gz
         tar -C $HOME/gcc-64 -zxf gcc-aarch64.tar.gz
         aria2c -o gcc-arm.tar.gz https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9/+archive/4d16d93f49c2b5ecdd0f12c38d194835dd595603.tar.gz
         tar -C $HOME/gcc-32 -zxf gcc-arm.tar.gz

    - name: Setup Clang
      run: |
         mkdir -p $HOME/clang
         if [ ${{ inputs.aosp-clang }} == "11" ]; then
             URL="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/tags/android-11.0.0_r46/clang-r383902b1.tar.gz"
         elif [ ${{ inputs.aosp-clang }} == "13" ]; then
             URL="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android13-release/clang-r450784d.tar.gz"
         elif [[ ${{ inputs.aosp-clang }} == http* ]]; then
             URL="${{ inputs.aosp-clang }}"
         else
             URL="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r530567.tar.gz"
         fi
         aria2c -o clang.tar.gz "$URL"
         tar -C $HOME/clang -zxf clang.tar.gz

    - name: Clone Kernel Source
      run: |
         git clone --depth=1 ${{ inputs.kernel-url }} -b ${{ inputs.kernel-branch }} kernel-dir

    - name: Konfigurasi LTO & KernelSU
      run: |
         cd kernel-dir
         # Disable LTO jika diperlukan
         if [ ${{ inputs.disable-lto }} = true ]; then
             sed -i 's/CONFIG_LTO=y/CONFIG_LTO=n/' arch/arm64/configs/${{ inputs.kernel-config }} || true
             sed -i 's/CONFIG_LTO_CLANG=y/CONFIG_LTO_CLANG=n/' arch/arm64/configs/${{ inputs.kernel-config }} || true
             echo "CONFIG_LTO_NONE=y" >> arch/arm64/configs/${{ inputs.kernel-config }}
         fi
         # Setup KernelSU
         if [ ${{ inputs.kernelsu }} == ksu ]; then
            curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s v0.9.5
         elif [ ${{ inputs.kernelsu }} == next ]; then
            curl -LSs "https://raw.githubusercontent.com/rifsxd/KernelSU-Next/next/kernel/setup.sh" | bash -s next
         fi

    - name: Proses Kompilasi
      run: |
         cd kernel-dir
         export PATH=$HOME/clang/bin:$HOME/gcc-64/bin:$HOME/gcc-32/bin:$PATH
         export KBUILD_BUILD_USER="linex"
         export KBUILD_BUILD_HOST="beryllium-project"
         
         # Variabel dasar make
         OPTS="ARCH=arm64 O=../out"
         
         # Pilih Toolchain
         if [ ${{ inputs.compiler }} == clang ]; then
            OPTS+=" CC=clang CROSS_COMPILE=aarch64-linux-android- CROSS_COMPILE_ARM32=arm-linux-androideabi- CLANG_TRIPLE=aarch64-linux-gnu-"
         elif [ ${{ inputs.compiler }} == llvm ]; then
            OPTS+=" CC=clang LLVM=1 LLVM_IAS=0 CROSS_COMPILE=aarch64-linux-android- CROSS_COMPILE_ARM32=arm-linux-androideabi-"
         fi

         make $OPTS ${{ inputs.kernel-config }}
         make -j$(nproc --all) $OPTS

    - name: Packaging dengan AnyKernel3
      run: |
          git clone --depth=1 ${{ inputs.AK3 }} AnyKernel3
          # Membersihkan template AK3
          rm -rf AnyKernel3/.git AnyKernel3/.github AnyKernel3/LICENSE AnyKernel3/README.md
          
          # Mencari file kernel yang berhasil di-build
          if [[ -f out/arch/arm64/boot/Image.gz-dtb ]]; then
            cp out/arch/arm64/boot/Image.gz-dtb AnyKernel3/Image.gz-dtb
          elif [[ -f out/arch/arm64/boot/Image-dtb ]]; then
            cp out/arch/arm64/boot/Image-dtb AnyKernel3/Image-dtb
          else
            cp out/arch/arm64/boot/Image.gz AnyKernel3/Image.gz || cp out/arch/arm64/boot/Image AnyKernel3/Image
          fi
          
          # Poco F1 butuh dtbo.img jika ada
          [ -f out/arch/arm64/boot/dtbo.img ] && cp out/arch/arm64/boot/dtbo.img AnyKernel3/dtbo.img || echo "No dtbo found"

    - name: Upload Hasil Build
      uses: actions/upload-artifact@v4
      with:
        name: "${{ inputs.name }}"
        path: AnyKernel3/*
