linex Project (Modified: EvaGCC Auto Support)

name: linext Compiler v2.4-ext (EvaGCC)

on: workflow_dispatch: inputs: ubuntu: description: 'Run on' default: 'ubuntu-latest' required: true type: string

name:
    description: 'Name'
    default: '4.9-kernel-eva'
    required: true
    type: string

  compiler:
    description: 'Compiler | gcc|clang|llvm'
    default: 'gcc'
    required: true
    type: string

  kernel-url:
    description: 'Kernel-url'
    default: 'https://github.com/PainKiller3/android_kernel_xiaomi_sdm845'
    required: true
    type: string

  kernel-branch:
    description: 'Kernel-branch'
    default: 'ten'
    required: true
    type: string

  kernel-config:
    description: 'Kernel-config'
    default: 'beryllium_defconfig'
    required: true
    type: string

jobs: build: runs-on: ${{ inputs.ubuntu }}

steps:
- name: Checkout
  uses: actions/checkout@v4

- name: Install dependencies
  run: |
    sudo apt update
    sudo apt install -y git bc bison flex libssl-dev make libc6-dev libncurses5-dev wget curl zip unzip

# ================= EVA GCC =================
- name: Setup EvaGCC
  run: |
    mkdir -p $HOME/eva

    echo "Cloning EvaGCC arm64..."
    git clone --depth=1 https://github.com/mvaisakh/gcc-arm64 -b gcc-new $HOME/eva/arm64

    echo "Cloning EvaGCC arm32..."
    git clone --depth=1 https://github.com/mvaisakh/gcc-arm -b gcc-new $HOME/eva/arm32

    echo "Exporting PATH..."
    echo "export PATH=$HOME/eva/arm64/bin:$HOME/eva/arm32/bin:$PATH" >> $GITHUB_ENV

# ================= KERNEL =================
- name: Clone Kernel
  run: |
    git clone --depth=1 ${{ inputs.kernel-url }} -b ${{ inputs.kernel-branch }} kernel

# ================= BUILD =================
- name: Build Kernel (EvaGCC)
  run: |
    cd kernel
    mkdir -p out

    export ARCH=arm64
    export SUBARCH=arm64

    export KBUILD_BUILD_USER="linext"
    export KBUILD_BUILD_HOST="github"

    export CROSS_COMPILE=aarch64-elf-
    export CROSS_COMPILE_ARM32=arm-eabi-

    make O=out ARCH=arm64 ${{ inputs.kernel-config }}
    make -j$(nproc --all) O=out ARCH=arm64

# ================= ANYKERNEL =================
- name: Package Kernel
  run: |
    git clone https://github.com/osm0sis/AnyKernel3
    cp kernel/out/arch/arm64/boot/Image.gz-dtb AnyKernel3/ 2>/dev/null || true
    cp kernel/out/arch/arm64/boot/Image AnyKernel3/ 2>/dev/null || true

    cd AnyKernel3
    zip -r9 kernel-EvaGCC.zip .

# ================= UPLOAD =================
- name: Upload Kernel
  uses: actions/upload-artifact@v4
  with:
    name: EvaGCC-Kernel
    path: AnyKernel3/*.zip
