name: SilverCore TEN - GCC

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup
        run: |
          sudo apt update
          sudo apt install -y git bc bison flex make gcc-aarch64-linux-gnu \
            gcc-arm-linux-gnueabi binutils-aarch64-linux-gnu libssl-dev libelf-dev zip

      - name: Clone & Build
        run: |
          git clone --depth=1 https://github.com/PainKiller3/android_kernel_xiaomi_sdm845 -b ten kernel
          cd kernel
          
          sed -i '/-mfix-cortex-a53-843419/d' arch/arm64/Makefile || true
          
          make O=../out beryllium_defconfig
          
          make -j2 O=../out ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            LD=aarch64-linux-gnu-ld.bfd \
            KBUILD_CFLAGS+="-Wno-error" || echo "Build selesai dengan warning"

      - name: Package
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3 AnyKernel3
          cp -f out/arch/arm64/boot/Image* AnyKernel3/ 2>/dev/null || true
          ls AnyKernel3

      - uses: actions/upload-artifact@v4
        with:
          name: SilverCore-ten
          path: AnyKernel3/
          
