# linex Project - Customized for Poco F1 (beryllium)
# Version 2.8 Ultimate Final Fix - Safe RAM, Adaptive Engine & Secure Packaging
name: Poco F1 Kernel Compiler 2.8
on:
  workflow_dispatch:
    inputs:
      ubuntu:
        description: 'Run on (Opsi: ubuntu-22.04 / ubuntu-latest)'
        default: 'ubuntu-22.04'
        required: true
        type: string
      zip_name:
        description: 'Nama File ZIP Akhir'
        default: 'Beryllium'
        required: true
        type: string
      kernel_version:
        description: 'Isi angka (misal 4.19.1) atau biarkan "original" untuk versi asli'
        default: 'original'
        required: true
        type: string
      kernel_name:
        description: 'Nama Utama Kernel'
        default: 'Southwest'
        required: true
        type: string
      rom_type:
        description: 'Tipe ROM / Tag Cabang'
        default: 'Dynamic-Gki'
        required: true
        type: string
      project_name:
        description: 'Build Project (@nama-project)'
        default: 'kyy'
        required: true
        type: string
      compiler:
        description: 'Pilih Compiler Pro'
        default: 'aosp-clang'
        required: true
        type: choice
        options:
        - aosp-clang
        - proton-clang
        - weebx-clang
        - zycromer-clang
        - sdclang
      aosp-clang-ver:
        description: 'Versi Clang (Hanya jika pakai aosp-clang)'
        default: '11'
        required: true
        type: choice
        options:
        - '11'
        - '12'
        - '13'
        - '14'
        - '15'
        - 'latest'
      gpu_min_clock:
        description: 'Frekuensi MINIMAL GPU (dalam MHz, Contoh: 180 atau 257)'
        default: '180'
        required: true
        type: string
      gpu_max_clock:
        description: 'Frekuensi MAKSIMAL GPU / OC (dalam MHz, Contoh: 710, 800, 825)'
        default: '800'
        required: true
        type: string
      kernel-url:
        description: 'Kernel Source URL (Bisa diganti bebas)'
        default: 'https://github.com/LineageOS/android_kernel_xiaomi_sdm845.git'
        required: true
        type: string
      kernel-branch:
        description: 'Kernel Branch'
        default: 'lineage-20'
        required: true
        type: string
      kernel-config:
        description: 'Kernel Config / Defconfig'
        default: 'sdm845-perf_defconfig'
        required: true
        type: string
      kernelsu:
        description: 'KernelSU (ksu / next / false)'
        default: 'ksu'
        required: true
        type: choice
        options:
        - ksu
        - next
        - "false"
      lto_type:
        description: 'Pilih Mode LTO (Link Time Optimization)'
        default: 'disable'
        required: true
        type: choice
        options:
        - disable
        - enable
        - thinlto
      AK3:
        description: 'AnyKernel3 Template URL'
        default: 'https://github.com/osm0sis/AnyKernel3'
        required: true
        type: string

jobs:
  build:
    runs-on: ${{ inputs.ubuntu }}
    steps:
    - name: Mempersiapkan Lingkungan Build & Bersihkan Storage Bloatware
      run: |
         echo "Building Poco F1 Kernel Version 2.8 Pro Ultimate Final Fix"
         sudo timedatectl set-timezone Asia/Jakarta
         sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
         sudo docker image prune --all --force

    - name: Checkout Workflow
      uses: actions/checkout@v4

    - name: Instalasi Paket Dependensi
      run: |
         sudo apt-get update
         sudo apt-get install --no-install-recommends -y gcc-arm-linux-gnueabi gcc-aarch64-linux-gnu lld llvm g++-aarch64-linux-gnu bc aria2 zip tar libssl-dev flex bison git git-lfs libelf-dev python3 libdata-dump-perl libtinfo-dev libncurses5-dev
         
         if [ -f /lib/x86_64-linux-gnu/libtinfo.so.6 ]; then
             sudo ln -sf /lib/x86_64-linux-gnu/libtinfo.so.6 /lib/x86_64-linux-gnu/libtinfo.so.5 || true
             sudo ln -sf /lib/x86_64-linux-gnu/libtinfo.so.6 /lib/x86_64-linux-gnu/libtinfo.so.6.0 || true
         else
             sudo apt-get install --no-install-recommends -y libtinfo5 || true
         fi
         aria2c -q https://raw.githubusercontent.com/Homebrew/install/master/uninstall.sh && NONINTERACTIVE=1 bash ./uninstall.sh -f -q

    - name: Optimasi Swap Space Tinggi (Anti IO Failure)
      run: |
         sudo swapoff -a || true
         sudo rm -f /mnt/swapfile || true
         sudo fallocate -l 16G /mnt/swapfile
         sudo chmod 600 /mnt/swapfile
         sudo mkswap /mnt/swapfile
         sudo swapon /mnt/swapfile

    - name: Download Toolchains (Hybrid Setup - ANTI LINK MATI)
      run: |
         rm -rf $HOME/tc $HOME/gcc-64 $HOME/gcc-32 $HOME/tmp-tc
         mkdir -p $HOME/tc $HOME/gcc-64 $HOME/gcc-32 $HOME/tmp-tc
         
         aria2c -q -o gcc-64.tar.gz "https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9/+archive/0a0604336d4d1067aa1aaef8d3779b31fcee841d.tar.gz"
         tar -C $HOME/gcc-64 -zxf gcc-64.tar.gz && rm gcc-64.tar.gz
         aria2c -q -o gcc-32.tar.gz "https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9/+archive/4d16d93f49c2b5ecdd0f12c38d194835dd595603.tar.gz"
         tar -C $HOME/gcc-32 -zxf gcc-32.tar.gz && rm gcc-32.tar.gz
         
         if [ "${{ inputs.compiler }}" = "aosp-clang" ]; then
             case "${{ inputs.aosp-clang-ver }}" in
                 11) URL="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/tags/android-11.0.0_r46/clang-r383902b1.tar.gz" ;;
                 12) URL="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/tags/android-12.1.0_r27/clang-r416183b1.tar.gz" ;;
                 13) URL="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/tags/android-13.0.0_r30/clang-r450784d.tar.gz" ;;
                 14) URL="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/tags/android-14.0.0_r15/clang-r487747c.tar.gz" ;;
                 15) URL="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android15-gsi/clang-r510928.tar.gz" ;;
                 *) URL="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r530567.tar.gz" ;;
             esac
             aria2c -q -o tc.tar.gz "$URL"
             tar -C $HOME/tc -zxf tc.tar.gz && rm tc.tar.gz
         
         elif [ "${{ inputs.compiler }}" = "proton-clang" ] || [ "${{ inputs.compiler }}" = "weebx-clang" ]; then
             if [ "${{ inputs.compiler }}" = "proton-clang" ]; then
                 URL="https://github.com/kdrag0n/proton-clang/archive/refs/heads/master.tar.gz"
             else
                 URL="https://github.com/Klozz/Yuki-clang/archive/refs/heads/master.tar.gz"
             fi
             aria2c -q -o toolchain.tar.gz "$URL"
             tar -C $HOME/tmp-tc -zxf toolchain.tar.gz && rm toolchain.tar.gz
             mv $HOME/tmp-tc/*/* $HOME/tc/ 2>/dev/null || mv $HOME/tmp-tc/* $HOME/tc/
             rm -rf $HOME/tc/bin/ld* $HOME/tc/bin/as*

         elif [ "${{ inputs.compiler }}" = "zycromer-clang" ] || [ "${{ inputs.compiler }}" = "zycromer" ]; then
             echo "Mengunduh ZyCromerZ Clang (Dengan Pengalih Otomatis)..."
             # Menggunakan mirror rilis Clang 19 buatan ZyCromerZ yang aktif
             URL="https://github.com/ZyCromerZ/Clang/releases/download/19.0.0-20240502-3/Clang-19.0.0-20240502-3.tar.gz"
             aria2c -q -o zycromer.tar.gz "$URL" || true
             
             # FALLBACK ENGINE: Jika tautan di atas mati/kosong, paksa alihkan ke Google Clang Base setara
             if [ ! -s zycromer.tar.gz ]; then
                 echo "=== WARNING: Link ZyCromerZ Mati! Dialihkan ke Google AOSP Clang 16/17 ==="
                 URL="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/tags/android-14.0.0_r15/clang-r487747c.tar.gz"
                 aria2c -q -o zycromer.tar.gz "$URL"
             fi
             
             tar -C $HOME/tmp-tc -zxf zycromer.tar.gz && rm zycromer.tar.gz
             
             # Penata letak folder adaptif untuk struktur ZyCromerZ
             Z_BIN=$(find $HOME/tmp-tc -type d -name "bin" | head -n 1)
             if [ -n "$Z_BIN" ]; then
                 cp -r $(dirname "$Z_BIN")/* $HOME/tc/
             else
                 cp -r $HOME/tmp-tc/* $HOME/tc/ 2>/dev/null || true
             fi
             rm -rf $HOME/tc/bin/ld* $HOME/tc/bin/as*

         elif [ "${{ inputs.compiler }}" = "sdclang" ]; then
             echo "Mengunduh SDClang via Tarball (Dengan Pengalih Otomatis)..."
             # Menggunakan cermin publik berbasis tarbal yang bebas autentikasi login
             URL="https://github.com/YuuAsuka/sdclang-12/archive/refs/heads/master.tar.gz"
             aria2c -q -o sdclang.tar.gz "$URL" || true
             
             # FALLBACK ENGINE: Jika tautan git/kustom mati, paksa alihkan ke Google Qualcomm Clang Base
             if [ ! -s sdclang.tar.gz ]; then
                 echo "=== WARNING: Link SDClang Mati! Dialihkan ke Qualcomm-AOSP Clang Base ==="
                 URL="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/tags/android-12.1.0_r27/clang-r416183b1.tar.gz"
                 aria2c -q -o sdclang.tar.gz "$URL"
             fi
             
             tar -C $HOME/tmp-tc -zxf sdclang.tar.gz && rm sdclang.tar.gz
             
             # Ekstraksi adaptif untuk subfolder SDClang
             S_BIN=$(find $HOME/tmp-tc -type d -name "bin" | head -n 1)
             if [ -n "$S_BIN" ]; then
                 cp -r $(dirname "$S_BIN")/* $HOME/tc/
             else
                 cp -r $HOME/tmp-tc/* $HOME/tc/ 2>/dev/null || true
             fi
             rm -rf $HOME/tc/bin/ld* $HOME/tc/bin/as*
         fi
         rm -rf $HOME/tmp-tc
         
    - name: Clone Kernel Source
      run: git clone --depth=1 ${{ inputs.kernel-url }} -b ${{ inputs.kernel-branch }} kernel-dir
      
    - name: Pro Configuration Engine
      run: |
         cd kernel-dir
         
         if [ "${{ inputs.kernel_version }}" != "original" ] && [ "${{ inputs.kernel_version }}" != "" ]; then
             sed -i "s/^VERSION =.*/VERSION = $(echo ${{ inputs.kernel_version }} | cut -d. -f1)/" Makefile
             sed -i "s/^PATCHLEVEL =.*/PATCHLEVEL = $(echo ${{ inputs.kernel_version }} | cut -d. -f2)/" Makefile
             sed -i "s/^SUBLEVEL =.*/SUBLEVEL = $(echo ${{ inputs.kernel_version }} | cut -d. -f3)/" Makefile
         fi
         
         TARGET_CONFIG="arch/arm64/configs/${{ inputs.kernel-config }}"
         
         sed -i "s/CONFIG_LOCALVERSION=.*/CONFIG_LOCALVERSION=\" ${{ inputs.kernel_name }} 么 ${{ inputs.rom_type }}\"/g" $TARGET_CONFIG || true
         
         touch .scmversion
         export LOCALVERSION=""
         
         # 1. FIXED AUDIO TECHPACK (AMPUTASI JALUR BERMASALAH)
         echo "Mematikan driver Elliptic Ultrasound Techpack..."
         sed -i 's/CONFIG_AUDIO_ELLIPTIC=y/CONFIG_AUDIO_ELLIPTIC=n/g' $TARGET_CONFIG || true
         echo "CONFIG_AUDIO_ELLIPTIC=n" >> $TARGET_CONFIG
         if [ -f techpack/audio/asoc/Makefile ]; then
             sed -i '/elliptic/d' techpack/audio/asoc/Makefile || true
         fi
         
         # 2. FIXED EFI STUB LINKER ERROR
         echo "Menonaktifkan EFI dan EFI_STUB dari file defconfig..."
         sed -i 's/CONFIG_EFI=y/CONFIG_EFI=n/g' $TARGET_CONFIG || true
         sed -i 's/CONFIG_EFI_STUB=y/CONFIG_EFI_STUB=n/g' $TARGET_CONFIG || true
         echo "CONFIG_EFI=n" >> $TARGET_CONFIG
         echo "CONFIG_EFI_STUB=n" >> $TARGET_CONFIG
         if [ -f drivers/firmware/Makefile ]; then
             sed -i 's/obj-$(CONFIG_EFI).*=.*/obj-$(CONFIG_EFI) += /g' drivers/firmware/Makefile || true
         fi

         # 3. FIX TOTAL SECTION MISMATCH WARNINGS (ESTETIKA LOG BERSIH)
         echo "Membungkam peringatan Section Mismatch modpost..."
         echo "CONFIG_SECTION_MISMATCH_WARN_ONLY=y" >> $TARGET_CONFIG
         echo "CONFIG_DEBUG_SECTION_MISMATCH=n" >> $TARGET_CONFIG
         sed -i 's/CONFIG_DEBUG_SECTION_MISMATCH=y/CONFIG_DEBUG_SECTION_MISMATCH=n/g' $TARGET_CONFIG || true

         # 4. CLEANSING RANJAU DTS QUALCOMM
         echo "Membersihkan target file VR (QVR) dan interposer rusak..."
         sed -i '/-qvr-/d' arch/arm64/boot/dts/qcom/Makefile || true
         sed -i '/qvr-evt/d' arch/arm64/boot/dts/qcom/Makefile || true
         sed -i '/qvr-dvt/d' arch/arm64/boot/dts/qcom/Makefile || true
         sed -i '/sdm845-interposer/d' arch/arm64/boot/dts/qcom/Makefile || true

         sed -i 's/CONFIG_USB_CONFIGFS_F_DIAG=y/CONFIG_USB_CONFIGFS_F_DIAG=n/g' $TARGET_CONFIG || true
         sed -i 's/CONFIG_USB_F_QDSS=y/CONFIG_USB_F_QDSS=n/g' $TARGET_CONFIG || true
         
         echo "CONFIG_KALLSYMS=y" >> $TARGET_CONFIG
         echo "CONFIG_KALLSYMS_ALL=y" >> $TARGET_CONFIG
         echo "CONFIG_KPROBES=y" >> $TARGET_CONFIG
         echo "CONFIG_HAVE_KPROBES=y" >> $TARGET_CONFIG
         
         # 5. AUTO-SELECT LTO ENGINE (DISABLE / ENABLE / THINLTO)
         SELECTED_LTO="${{ inputs.lto_type }}"
         echo "Mode LTO yang dipilih di UI: $SELECTED_LTO"
         
         # Bersihkan dulu sisa config LTO bawaan agar tidak bentrok
         sed -i 's/CONFIG_LTO=.*/# CONFIG_LTO is not set/g' $TARGET_CONFIG || true
         sed -i 's/CONFIG_LTO_CLANG=.*/# CONFIG_LTO_CLANG is not set/g' $TARGET_CONFIG || true
         sed -i 's/CONFIG_THINLTO=.*/# CONFIG_THINLTO is not set/g' $TARGET_CONFIG || true
         sed -i 's/CONFIG_LTO_NONE=.*/# CONFIG_LTO_NONE is not set/g' $TARGET_CONFIG || true

         if [ "$SELECTED_LTO" = "enable" ]; then
             echo "Mengaktifkan Full LTO Clang..."
             echo "CONFIG_LTO=y" >> $TARGET_CONFIG
             echo "CONFIG_LTO_CLANG=y" >> $TARGET_CONFIG
         elif [ "$SELECTED_LTO" = "thinlto" ]; then
             echo "Mengaktifkan ThinLTO Clang..."
             echo "CONFIG_LTO=y" >> $TARGET_CONFIG
             echo "CONFIG_LTO_CLANG=y" >> $TARGET_CONFIG
             echo "CONFIG_THINLTO=y" >> $TARGET_CONFIG
         else
             echo "Menonaktifkan LTO (LTO None)..."
             echo "CONFIG_LTO_NONE=y" >> $TARGET_CONFIG
         fi

         echo "Mengonfigurasi Frekuensi GPU..."
         MIN_HZ=$(($(echo ${{ inputs.gpu_min_clock }}) * 1000000))
         MAX_HZ=$(($(echo ${{ inputs.gpu_max_clock }}) * 1000000))
         TARGET_DTSI="arch/arm64/boot/dts/qcom/sdm845-gpu.dtsi"
         if [ -f "$TARGET_DTSI" ]; then
             sed -i "/qcom,gpu-pwrlevel@0/,/qcom,gpu-pwrlevel/s/qcom,gpu-freq = <.*>;/qcom,gpu-freq = <$MAX_HZ>;/g" $TARGET_DTSI || true
             sed -i "/qcom,gpu-pwrlevel@6/,/qcom,gpu-pwrlevel/s/qcom,gpu-freq = <.*>;/g" $TARGET_DTSI || true
         else
             find arch/arm64/boot/dts/ digest -name "*gpu*.dtsi" -exec sed -i "s/qcom,gpu-freq = <710000000>;/qcom,gpu-freq = <$MAX_HZ>;/g" {} + || true
         fi
         
         if [ "${{ inputs.kernelsu }}" = "ksu" ]; then
            curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s v0.9.5
         elif [ "${{ inputs.kernelsu }}" = "next" ]; then
            curl -LSs "https://raw.githubusercontent.com/rifsxd/KernelSU-Next/next/kernel/setup.sh" | bash -s next
         fi

             echo "Menjinakkan Makefile VDSO secara adaptif untuk ZyCromer & SDClang..."
         VDSO_MAKEFILE="arch/arm64/kernel/vdso/Makefile"
         if [ -f "$VDSO_MAKEFILE" ]; then
             # Amputasi total semua flag assembler ganda yang bikin crash
             sed -i 's/-cc1as//g' $VDSO_MAKEFILE || true
             sed -i 's/CC_FLAGS_VDSO .=\s*-no-integrated-as//g' $VDSO_MAKEFILE || true
             sed -i 's/CC_FLAGS_VDSO .=\s*-integrated-as//g' $VDSO_MAKEFILE || true
             sed -i '/cc1as/d' $VDSO_MAKEFILE || true
             sed -i 's/$(CC) $(ccflags-y)/$(CC) -no-integrated-as $(ccflags-y)/g' $VDSO_MAKEFILE || true
         fi

         sed -i 's/CONFIG_LKDTM=y/CONFIG_LKDTM=n/g' $TARGET_CONFIG || true
         echo "CONFIG_LKDTM=n" >> $TARGET_CONFIG

    - name: Proses Kompilasi Pro (SAFE MULTITHREADING ENGINE)
      run: |
         cd kernel-dir
         export PATH=$HOME/tc/bin:$HOME/gcc-64/bin:$HOME/gcc-32/bin:$PATH
         export KBUILD_BUILD_USER="${{ inputs.project_name }}"
         export KBUILD_BUILD_HOST="project-labs"
         
         # AUTO-SELECT DETECTOR ENGINE: Menentukan nilai IAS dari drop-down UI GitHub
         SELECTED_COMPILER="${{ inputs.compiler }}"
         echo "Compiler yang dipilih di UI: $SELECTED_COMPILER"
         
         if [ "$SELECTED_COMPILER" = "weebx-clang" ] || [ "$SELECTED_COMPILER" = "proton-clang" ]; then
             echo "Memicu Integrated Assembler (LLVM_IAS=1) untuk compiler modern..."
             USE_IAS=1
         elif [ "$SELECTED_COMPILER" = "sdclang" ] || [ "$SELECTED_COMPILER" = "zycromer-clang" ] || [ "$SELECTED_COMPILER" = "zycromer" ]; then
             echo "MEMAKSA GCC EXTERNAL ASSEMBLER (LLVM_IAS=0) UNTUK BYPASS VDSO JUNK LINES..."
             USE_IAS=0
             
             # INTERVENSI AGRESIF LANGSUNG DI TEMPAT PADA MAKEFILE VDSO
             VDSO_MAKEFILE="arch/arm64/kernel/vdso/Makefile"
             if [ -f "$VDSO_MAKEFILE" ]; then
                 echo "=== MEMBERSIHKAN RANJAU VDSO MAKEFILE UNTUK SDCLANG/ZYCROMER ==="
                 sed -i '/-cc1as/d' $VDSO_MAKEFILE || true
                 sed -i '/integrated-as/d' $VDSO_MAKEFILE || true
                 sed -i 's/$(CC) $(ccflags-y)/$(CC) -no-integrated-as $(ccflags-y)/g' $VDSO_MAKEFILE || true
             fi
         else
             echo "Memicu GCC External Assembler (LLVM_IAS=0) untuk mencegah Broken Pipe..."
             USE_IAS=0
         fi
         
         rm -rf ../out && mkdir -p ../out
         make ARCH=arm64 O=../out ${{ inputs.kernel-config }}
         
         TOTAL_CORES=$(nproc --all)
         if [ $TOTAL_CORES -gt 1 ]; then
             SAFE_CORES=$((TOTAL_CORES - 1))
         else
             SAFE_CORES=1
         fi
         echo "Menggunakan $SAFE_CORES dari $TOTAL_CORES Core demi kestabilan alokasi RAM..."
         
         make -j$SAFE_CORES ARCH=arm64 O=../out \
              CC=clang \
              AR=llvm-ar \
              NM=llvm-nm \
              OBJCOPY=llvm-objcopy \
              OBJDUMP=llvm-objdump \
              STRIP=aarch64-linux-android-strip \
              LLVM_IAS=$USE_IAS \
              CROSS_COMPILE=aarch64-linux-android- \
              CROSS_COMPILE_ARM32=arm-linux-androideabi- \
              CLANG_TRIPLE=aarch64-linux-gnu- \
              KCFLAGS="-w -Wno-error -fno-builtin" \
              HOSTCFLAGS="-w -Wno-error" Image.gz Image.gz-dtb dtbs 2>&1 | tee build.log
         
         if [ ! -f ../out/arch/arm64/boot/Image ] && [ ! -f ../out/arch/arm64/boot/Image.gz ] && [ ! -f ../out/arch/arm64/boot/Image.gz-dtb ]; then
             echo "ERROR: Kompilasi Gagal!"
             tail -n 300 build.log
             exit 1
         fi
         
    - name: Smart Packaging (SAFE EXTRACTION - MULTI PATH DETECTOR)
      run: |
          rm -f *.zip
          git clone --depth=1 ${{ inputs.AK3 }} AnyKernel3
          rm -rf AnyKernel3/.git AnyKernel3/.github AnyKernel3/LICENSE AnyKernel3/README.md
          
          [ -f AnyKernel3/anykernel.sh ] && sed -i "s/kernel.string=.*/kernel.string=${{ inputs.zip_name }}/g" AnyKernel3/anykernel.sh || true
          
          # Tentukan variabel jalur pencarian (Lokasi Luar, Lokasi Internal, Lokasi Sub-Out)
          BIN_DIR=""
          if [ -f "../out/arch/arm64/boot/Image.gz-dtb" ] || [ -f "../out/arch/arm64/boot/Image.gz" ]; then
              BIN_DIR="../out/arch/arm64/boot"
              echo "Biner ditemukan di Jalur Luar (../out)"
          elif [ -f "arch/arm64/boot/Image.gz-dtb" ] || [ -f "arch/arm64/boot/Image.gz" ]; then
              BIN_DIR="arch/arm64/boot"
              echo "Biner ditemukan di Jalur Internal (kernel-dir/arch)"
          elif [ -f "out/arch/arm64/boot/Image.gz-dtb" ] || [ -f "out/arch/arm64/boot/Image.gz" ]; then
              BIN_DIR="out/arch/arm64/boot"
              echo "Biner ditemukan di Jalur Sub-Out (kernel-dir/out)"
          fi

          # Eksekusi Penyalinan berdasarkan jalur yang valid
          if [ -n "$BIN_DIR" ]; then
              if [ -f "$BIN_DIR/Image.gz-dtb" ]; then
                  echo "Menyalin Image.gz-dtb ke AnyKernel3..."
                  cp $BIN_DIR/Image.gz-dtb AnyKernel3/Image.gz-dtb
              elif [ -f "$BIN_DIR/Image.gz" ]; then
                  echo "Menyalin Image.gz standar..."
                  if [ -f "$BIN_DIR/dts/qcom/sdm845-beryllium.dtb" ]; then
                      cat $BIN_DIR/Image.gz $BIN_DIR/dts/qcom/sdm845-beryllium.dtb > AnyKernel3/Image.gz-dtb
                  elif [ -f "$BIN_DIR/dts/sdm845-beryllium.dtb" ]; then
                      cat $BIN_DIR/Image.gz $BIN_DIR/dts/sdm845-beryllium.dtb > AnyKernel3/Image.gz-dtb
                  else
                      cp $BIN_DIR/Image.gz AnyKernel3/Image.gz
                  fi
              elif [ -f "$BIN_DIR/Image" ]; then
                  cp $BIN_DIR/Image AnyKernel3/Image
              fi
          else
              echo "ERROR: Biner kernel benar-benar gaib! Tidak ditemukan di jalur manapun."
              exit 1
          fi
          
          # Cari DTBO secara fleksibel
          if [ -f "../out/arch/arm64/boot/dtbo.img" ]; then
              cp ../out/arch/arm64/boot/dtbo.img AnyKernel3/dtbo.img
          elif [ -f "arch/arm64/boot/dtbo.img" ]; then
              cp arch/arm64/boot/dtbo.img AnyKernel3/dtbo.img
          elif [ -f "out/arch/arm64/boot/dtbo.img" ]; then
              cp out/arch/arm64/boot/dtbo.img AnyKernel3/dtbo.img
          fi
          
          cd AnyKernel3
          zip -r9 "../${{ inputs.zip_name }}-${{ inputs.rom_type }}.zip" * -x .git README.md

    - name: Upload Final Build
      uses: actions/upload-artifact@v4
      with:
        name: "${{ inputs.zip_name }}-${{ inputs.rom_type }}-Final-2.8"
        path: "*.zip"
