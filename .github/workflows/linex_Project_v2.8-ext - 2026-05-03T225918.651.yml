name: Kyzuna Kernel Compiler Final
on:
  workflow_dispatch:
    inputs:
      name:
        description: 'Nama Kernel'
        default: 'Kyzuna-Beryllium'
        required: true
      kernel-url:
        description: 'Link Source Kernel'
        default: 'https://github.com/linex-17/Kyzuna.git'
        required: true
      kernel-branch:
        description: 'Nama Branch'
        default: 'main'
        required: true
      kernel-config:
        description: 'File Defconfig'
        default: 'beryllium_defconfig'
        required: true
      compiler:
        description: 'Pilih Toolchain'
        default: 'clang'
        type: choice
        options:
        - clang
        - llvm
      disable-lto:
        description: 'Matikan LTO? (True jika build gagal/lambat)'
        default: 'true'
        type: choice
        options:
        - 'true'
        - 'false'
      kernelsu:
        description: 'Pasang KernelSU?'
        default: 'ksu'
        type: choice
        options:
        - ksu
        - next
        - false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Cleanup Environment
      uses: actions/checkout@v4

    - name: Instalasi Paket Dependensi
      run: |
         sudo apt-get update
         sudo apt-get install --no-install-recommends -y gcc-arm-linux-gnueabi gcc-aarch64-linux-gnu lld llvm g++-aarch64-linux-gnu bc aria2 zip tar libssl-dev
         sudo timedatectl set-timezone Asia/Jakarta

    - name: Download Proton Clang (Anti-Stuck)
      run: |
         mkdir -p $HOME/clang
         echo "--- Downloading Proton Clang Toolchain ---"
         aria2c -x 16 -s 16 -j 16 --summary-interval=5 -o proton-clang.tar.gz "https://gitlab.com/kdrag0n/proton-clang/-/archive/master/proton-clang-master.tar.gz"
         
         echo "--- Extracting Toolchain (Estimasi 1-2 Menit) ---"
         tar -C $HOME/clang --strip-components=1 -xf proton-clang.tar.gz
         rm proton-clang.tar.gz
         echo "--- Toolchain Ready ---"

    - name: Clone Kyzuna Source
      run: git clone --depth=1 ${{ inputs.kernel-url }} -b ${{ inputs.kernel-branch }} kernel-dir

    - name: Patching Branding & KernelSU
      run: |
         cd kernel-dir
         # Versi Kernel di Tentang Ponsel: 4.9.xxx-kyzuna
         sed -i 's/CONFIG_LOCALVERSION=.*/CONFIG_LOCALVERSION="-kyzuna"/g' arch/arm64/configs/${{ inputs.kernel-config }}
         if ! grep -q "CONFIG_LOCALVERSION=" arch/arm64/configs/${{ inputs.kernel-config }}; then
            echo 'CONFIG_LOCALVERSION="-kyzuna"' >> arch/arm64/configs/${{ inputs.kernel-config }}
         fi

         # Konfigurasi LTO
         if [ "${{ inputs.disable-lto }}" == "true" ]; then
             sed -i 's/CONFIG_LTO=y/CONFIG_LTO=n/' arch/arm64/configs/${{ inputs.kernel-config }} || true
             sed -i 's/CONFIG_LTO_CLANG=y/CONFIG_LTO_CLANG=n/' arch/arm64/configs/${{ inputs.kernel-config }} || true
             echo "CONFIG_LTO_NONE=y" >> arch/arm64/configs/${{ inputs.kernel-config }}
         fi

         # Setup KernelSU (v0.9.5 Stable)
         if [ "${{ inputs.kernelsu }}" == "ksu" ]; then
            curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s v0.9.5
         elif [ "${{ inputs.kernelsu }}" == "next" ]; then
            curl -LSs "https://raw.githubusercontent.com/rifsxd/KernelSU-Next/next/kernel/setup.sh" | bash -s next
         fi

    - name: Kompilasi Kernel
      run: |
         cd kernel-dir
         # Proton Clang Path
         export PATH=$HOME/clang/bin:$PATH
         
         # Arguments untuk Proton Clang (Sangat Stabil untuk 4.9)
         MAKE_OPTS="ARCH=arm64 O=../out \
                    CC=clang \
                    CROSS_COMPILE=aarch64-linux-gnu- \
                    CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
                    AR=llvm-ar \
                    NM=llvm-nm \
                    OBJCOPY=llvm-objcopy \
                    OBJDUMP=llvm-objdump \
                    STRIP=llvm-strip"

         if [ "${{ inputs.compiler }}" == "llvm" ]; then
            MAKE_OPTS+=" LLVM=1 LLVM_IAS=1"
         fi

         # Mulai Build
         make $MAKE_OPTS ${{ inputs.kernel-config }}
         make -j$(nproc --all) $MAKE_OPTS

    - name: Packaging AnyKernel3
      run: |
         git clone --depth=1 https://github.com/osm0sis/AnyKernel3 AnyKernel3
         rm -rf AnyKernel3/.git
         
         # Kustomisasi nama kernel di TWRP
         sed -i "s/kernel.string=.*/kernel.string=${{ inputs.name }} by Kyzuna/g" AnyKernel3/anykernel.sh
         sed -i "s/device.name1=.*/device.name1=beryllium/g" AnyKernel3/anykernel.sh
         
         # Deteksi hasil build Poco F1
         if [ -f out/arch/arm64/boot/Image.gz-dtb ]; then
            cp out/arch/arm64/boot/Image.gz-dtb AnyKernel3/Image.gz-dtb
         elif [ -f out/arch/arm64/boot/Image-dtb ]; then
            cp out/arch/arm64/boot/Image-dtb AnyKernel3/Image-dtb
         elif [ -f out/arch/arm64/boot/Image.gz ]; then
            cp out/arch/arm64/boot/Image.gz AnyKernel3/Image.gz
         fi
         [ -f out/arch/arm64/boot/dtbo.img ] && cp out/arch/arm64/boot/dtbo.img AnyKernel3/dtbo.img || true

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.name }}-Kyzuna-Build
        path: AnyKernel3/*
