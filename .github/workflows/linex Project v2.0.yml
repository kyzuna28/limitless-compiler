name: "Build kernels"

env:
  OUT_DIR: "${{ github.workspace }}/out"

on:
  workflow_dispatch:

jobs:
  Set-repos:
    name: "🐂 Parse repos.json"
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.generate-matrix.outputs.repos }}
      builddate: ${{ steps.generate-builddate.outputs.builddate }}

    steps:
      - name: "😄 Checkout"
        uses: actions/checkout@v3

      - name: "📦 Install jq"
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: "😆 Generate Matrix"
        id: generate-matrix
        run: |
          echo "repos<<EOF" >> $GITHUB_OUTPUT
          jq -s '[.[][]]' repos*.json >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: "⏰ Set builddate"
        id: generate-builddate
        run: echo "builddate=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

  Build-Kernel:
    name: "🐎 Build kernel"
    runs-on: ubuntu-22.04
    needs: Set-repos

    strategy:
      max-parallel: 4
      fail-fast: false
      matrix:
        repos: ${{ fromJSON(needs.Set-repos.outputs.repos) }}

    env:
      WORKSPACE: ${{ github.workspace }}
      builddate: "${{ needs.Set-repos.outputs.builddate }}"

      KERNEL_NAME: ${{ matrix.repos.kernelSource.name }}
      KERNEL_REPO: ${{ matrix.repos.kernelSource.repo }}
      KERNEL_BRANCH: ${{ matrix.repos.kernelSource.branch }}
      KERNEL_DEVICE: ${{ matrix.repos.kernelSource.device }}
      DEFCONFIG_NAME: ${{ matrix.repos.kernelSource.defconfig }}

      withKernelSU: ${{ matrix.repos.withKernelSU }}
      useAnykernel: ${{ matrix.repos.AnyKernel3.use }}
      release: ${{ matrix.repos.AnyKernel3.release }}

    steps:
      - name: "⭐ Install prerequisites"
        run: |
          sudo apt-get update
          sudo apt-get install -y \
          build-essential bc curl git zip ftp \
          gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
          libssl-dev lftp zstd wget libfl-dev \
          python3 python-is-python3 \
          libarchive-tools jq

      - name: "⏰ Setup AnyKernel3"
        if: ${{ env.useAnykernel == 'true' }}
        env:
          params: "${{ toJSON(matrix.repos.AnyKernel3) }}"
        run: |
          ANYKERNEL_REPO=$(echo $params | jq -r ".repo")
          ANYKERNEL_BRANCH=$(echo $params | jq -r ".branch")
          git clone --depth=1 --branch $ANYKERNEL_BRANCH $ANYKERNEL_REPO AnyKernel3

      - name: "🌟 Clone kernel source"
        run: |
          git clone --depth=1 --recursive \
          --branch $KERNEL_BRANCH $KERNEL_REPO $KERNEL_NAME

      - name: "💫 Get toolchains"
        env:
          toolchains: "${{ toJSON(matrix.repos.toolchains) }}"
        run: |
          count=$(echo $toolchains | jq 'length')
          for ((i=0;i<count;i++)); do
            name=$(echo $toolchains | jq -r ".[$i].name")
            repo=$(echo $toolchains | jq -r ".[$i].repo")
            branch=$(echo $toolchains | jq -r ".[$i].branch")

            git clone --depth=1 --branch $branch $repo $name

            for path in $(echo $toolchains | jq -r ".[$i].binPath[]"); do
              echo "$WORKSPACE/$name/$path" >> $GITHUB_PATH
            done
          done

      - name: "😎 Set args"
        id: generate-args
        env:
          params: "${{ toJSON(matrix.repos.params) }}"
        run: |
          ARCH=$(echo $params | jq -r ".ARCH")
          CC=$(echo $params | jq -r ".CC")

          args="-j$(nproc)"

          mkdir -p $OUT_DIR
          args="$args O=$OUT_DIR"

          [ "$ARCH" != "null" ] && args="$args ARCH=$ARCH"
          [ "$CC" != "null" ] && args="$args CC=$WORKSPACE/$CC"

          while read -r ext; do
            args="$args $ext"
          done < <(jq -r '.externalCommand | to_entries[] | "\(.key)='$WORKSPACE'/\(.value)"' <<< "$params")

          echo "args=$args" >> $GITHUB_OUTPUT
          echo "ARCH=$ARCH" >> $GITHUB_OUTPUT

      - name: "😋 Update KernelSU"
        if: ${{ env.withKernelSU == 'true' }}
        working-directory: ${{ env.KERNEL_NAME }}
        run: |
          curl -LSs https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh | bash -

      - name: "👍 Make defconfig"
        working-directory: ${{ env.KERNEL_NAME }}
        run: |
          make ${{ steps.generate-args.outputs.args }} $DEFCONFIG_NAME

      - name: "🎶 Build kernel"
        working-directory: ${{ env.KERNEL_NAME }}
        run: |
          make ${{ steps.generate-args.outputs.args }}

      - name: "💛 Upload Image"
        uses: actions/upload-artifact@v3
        with:
          name: Image-${{ env.KERNEL_DEVICE }}-${{ env.builddate }}
          path: ${{ env.OUT_DIR }}/arch/${{ steps.generate-args.outputs.ARCH }}/boot/Image

      - name: "❤️ Pack AnyKernel3"
        if: ${{ env.useAnykernel == 'true' }}
        run: |
          cp $OUT_DIR/arch/${{ steps.generate-args.outputs.ARCH }}/boot/Image.gz-dtb AnyKernel3/ || true
          cd AnyKernel3
          zip -r kernel.zip *

      - name: "💾 Upload AnyKernel3"
        if: ${{ env.useAnykernel == 'true' }}
        uses: actions/upload-artifact@v3
        with:
          name: AnyKernel3-${{ env.KERNEL_DEVICE }}-${{ env.builddate }}
          path: AnyKernel3/*
