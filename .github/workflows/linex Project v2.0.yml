name: LawRun SDM845

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
          git bc bison flex make clang llvm lld \
          libssl-dev libelf-dev \
          gcc-aarch64-linux-gnu \
          zip unzip python3 wget curl

      - name: Setup build env
        run: |
          echo "ARCH=arm64" >> $GITHUB_ENV
          echo "SUBARCH=arm64" >> $GITHUB_ENV
          echo "KBUILD_BUILD_USER=github-actions" >> $GITHUB_ENV
          echo "KBUILD_BUILD_HOST=lawrun-ci" >> $GITHUB_ENV

      - name: Detect defconfig
        run: |
          echo "Available defconfigs:"
          ls arch/arm64/configs/

          # auto-pick common SDM845 config
          if [ -f arch/arm64/configs/sdm845_defconfig ]; then
            echo "DEFCONFIG=sdm845_defconfig" >> $GITHUB_ENV
          elif [ -f arch/arm64/configs/beryllium_defconfig ]; then
            echo "DEFCONFIG=beryllium_defconfig" >> $GITHUB_ENV
          else
            echo "DEFCONFIG=sdm845_defconfig" >> $GITHUB_ENV
          fi

      - name: Build defconfig
        run: |
          make O=out ARCH=arm64 $DEFCONFIG

      - name: Compile kernel (clang)
        run: |
          make -j$(nproc --all) O=out \
          ARCH=arm64 \
          CC=clang \
          LLVM=1 \
          LLVM_IAS=1 \
          CROSS_COMPILE=aarch64-linux-gnu-

      - name: Collect output
        run: |
          mkdir -p release

          # kernel image
          cp out/arch/arm64/boot/Image* release/ 2>/dev/null || true

          # dtb (kalau ada)
          find out/arch/arm64/boot -name "*.dtb" -exec cp {} release/ \; || true

          cd release
          zip -r9 LawRun-SDM845-Kernel.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LawRun-Kernel-master
          path: release/LawRun-SDM845-Kernel.zip
